# Mirrors the work pattern: plan on PR, apply on main.
# State backend: HCP Terraform (workspace in LOCAL execution mode — CI runs terraform, HCP holds state).
# Needs repo secrets: TF_API_TOKEN (HCP Terraform user token, Phase 1 step D).
# Later phases add: OCI_* auth, DYNATRACE_API_TOKEN, NEW_RELIC_API_KEY, GRAFANA_CLOUD_TOKEN.
name: terraform
on:
  pull_request:
    paths: ['terraform/**']
  push:
    branches: [main]
    paths: ['terraform/**']

defaults:
  run:
    working-directory: terraform/envs/lab

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform plan -no-color

  apply:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - run: terraform init
      - run: terraform apply -auto-approve
