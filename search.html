— for the Claude running on the Linux home server You are Claude, running on Santi\u0027s Linux laptop/home server that hosts a Docker media stack (Plex, Jellyseerr, Radarr, Sonarr, Prowlarr, qBittorrent — verify, don\u0027t assume). Your mission: make this stack observable in Dynatrace and New Relic via OpenTelemetry , so Santi learns container observability on real workloads. Read CLAUDE.md in this repo first — its hard rules apply here, plus the stricter ones below. Non-negotiable rules for THIS machine 1. This repo is PUBLIC. Nothing host-specific ever gets committed : no IPs, hostnames, MACs, compose files, volume paths, media library names. All work happens OUTSIDE the repo clone in ~/observability/ (local only, never a git remote unless Santi makes a private repo). 2. Egress-only. The collector pushes out. Open no inbound ports, change no router config. 3. Do not touch the media containers themselves (no restarts, no compose edits) without asking Santi first — this stack is in daily use. Adding NEW containers alongside is fine. 4. Secrets (API tokens) live in ~/observability/.env , chmod 600, never echoed, never committed. 5. Ingest caps are real : New Relic free = 100 GB/month with full-platform lockout on breach. Start metrics-only; add logs with filters later. When in doubt, send less. Session protocol 1. git pull this repo; read HANDOFF-STATE.md for anything newer than this file. 2. Inventory (read-only): docker ps --format \u0027table {{.Names}}\\t{{.Image}}\\t{{.Status}}\u0027 , docker system df , df -h , free -h , and locate (but do not edit) the compose file. Show Santi the inventory; confirm scope before building. 3. Execute the milestones below in order. One milestone per session is fine. 4. At the end: update HANDOFF-STATE.md with GENERIC progress only (\"M1 done, both backends receiving\") — no host details — rebuild search.html if you changed docs, remind Santi to push. Credentials you must ask Santi for (never mint or guess) - Dynatrace : tenant = https://fjl36225.sprint.apps.dynatracelabs.com (free until 2026-10). Ask for an API token with scopes: metrics.ingest , logs.ingest , openTelemetryTrace.ingest . Get the exact OTLP endpoint from the tenant UI (search \"OpenTelemetry\" in the tenant; sprint environments use a …sprint.dynatracelabs.com/api/v2/otlp form — verify in the UI, do not guess the URL ). - New Relic : if no account exists yet (check vault/09 Signup Checklist.md ), walk Santi through https://newrelic.com/signup (free, no card) — choose the EU data center . Then ask for the license key (ingest type). EU OTLP endpoint: https://otlp.eu01.nr-data.net:4318 (US accounts use otlp.nr-data.net — match the account region, this is the 1 silent failure). Milestone 1 — container + host metrics into BOTH backends (one evening) In ~/observability/ , create three files. docker-compose.yml : .env (chmod 600): config.yaml (collector): Start: docker compose up -d → docker logs otelcol must show no export errors after 2 minutes. Verify in both UIs (Dynatrace: Metrics browser, search container. ; New Relic: Metrics explorer, filter deployment.environment = home-server ). 📸 both. Milestone done = the same per-container CPU/memory visible in two vendors. Milestone 2 — logs, with the safety filters ON from minute one Add a filelog receiver on /var/lib/docker/containers/ / -json.log (mount it :ro, add the json_parser operator), a filter processor dropping severity \u003c WARN for the chatty arr containers, and a logs pipeline to both exporters. Before enabling: estimate volume with docker logs --since 24h \u003cnoisiest wc -c × containers × 30 — if the projection exceeds ~1.5 GB/day, filter harder. After 48 h, check actual ingest in both UIs and record the number in the vendor-comparison notes. Milestone 3 — the alerts that make it observability (not just dashboards) 1. Disk pressure (the realistic failure: qBittorrent fills the disk): alert at 85% filesystem used — build it in BOTH vendors, compare the experience. Dynatrace side goes in terraform/modules/dynatrace-config (it\u0027s tenant config — as code, always). 2. Container down : docker stop a low-stakes container (ask Santi which) → both vendors must show it → restart it. Time-to-detect goes in the comparison notes. 3. Transcode spike : play something that forces a Plex transcode → find the CPU spike in both. Milestone 4 (stretch) — OneAgent vs OTel Deploy the Dynatrace OneAgent container alongside (tenant UI → Deploy → Docker). Compare against the OTel view: what does OneAgent see that OTel doesn\u0027t (process-level, auto-topology), what does it cost in resources, which would you deploy at a client? One page of notes → interview gold. Remove it after if the laptop feels it. Troubleshooting order docker logs otelcol → add a debug exporter temporarily → check the endpoint region (EU vs US is the classic) → check token scopes → curl -v the OTLP endpoint from the host. Never debug by pasting tokens into chat or commits."},{"p":"README.md","t":"personal-lab — observability lab, everything-as-code","x":"personal-lab — observability lab, everything-as-code One repo = the whole project: architecture, step-by-step guides (an Obsidian vault), Terraform, and CI. Personal accounts only (github.com, gmail, Azure free, OCI free). Nothing here touches work systems. How to read this from any machine 1. Santi pushes this repo to github.com/SScleves/personal-lab (public). 2. On the laptop: git clone https://github.com/SScleves/personal-lab.git 3. Open the vault/ folder in Obsidian ( Open folder as vault ) → the full guide with the graph view. Map Path What --- --- CLAUDE.md AI assistants start here — session protocol, hard rules, decisions already made ARCHITECTURE.md The design: components, data flows, free-tier limits, what dies when, €0 proof vault/ Obsidian guide — phases, per-technology notes, demo script. Start at 00 Home terraform/ All infrastructure as code. envs/lab is the only environment .github/workflows/ CI: gitleaks on e hboards, one IRM alert route. Watch the 10k active-series cap — it\u0027s the limit a mislabeled exporter blows first. Bonus: 500 k6 cloud VUh/month are included — send k6 results here."},{"p":"terraform/modules/newrelic-config/README.md","t":"module newrelic-config (Phase 4)","x":"module newrelic-config (Phase 4) Free tier is forever but hard-stops at 100 GB/month (full platform lockout until month rollover). This module therefore ships, in order of importance: 1. NRQL drop rules for chatty k8s namespaces/debug logs. 2. Ingest alert at 50 GB (email — the free notification channel). 3. Parity dashboards mirroring the Dynatrace SLO views for the vendor comparison doc."},{"p":"terraform/modules/oci-cluster/README.md","t":"module oci-cluster (Phase 2)","x":"module oci-cluster (Phase 2) Always-free Ampere A1 (4 OCPU / 24 GB / VM.Standard.A1.Flex) + VCN + security list opening: 22/tcp (admin), 80/443 (site/probes), 7000-8000/udp (Agones gameserver port range), 6443 (k3s API, restrict to home IP). cloud-init installs k3s (single node, server+agent) and labels the node for Agones. STAY inside always-free: one A1.Flex ≤ 4 OCPU/24 GB total, boot volume ≤ 200 GB, no paid add-ons. Known issue: \"Out of host capacity\" for free A1 in busy regions — pick a quieter home region or retry; region choice is permanent per tenancy, choose before signup."},{"p":"vault/00 Home.md","t":"🏠 Personal Observability Lab","x":"🏠 Personal Observability Lab One repo, €0, every job-offer bullet demonstrable. The design lives in ARCHITECTURE.md (repo root); this vault is the how . Open the graph view — every note links to what it touches. Start here - 08 Month Plan — the week-by-week schedule with exercises per technology ⭐ - 09 Signup Checklist — every account, its status, and when it\u0027s needed Phases (the detailed guides, in order) 1. 01 Phase 0 — Free Tiers and Architecture — ✅ done 2026-07-06 2. 02 Phase 1 — Accounts, Repo, State — ⬅️ you are here (repo ✅, HCP 🟡, OCI ⬜) 3. 03 Phase 2 — Cluster and Agones 4. 04 Phase 3 — OTel and Dynatrace 5. 05 Phase 4 — New Relic and Comparison 6. 06 Phase 5 — Databricks, Airflow, AI 7. 07 Demo Script — the on-camera flow everything builds toward The stack, by layer - Code \u0026 CI : Terraform · GitHub Actions · HCP Terraform (state) · Secrets Hygiene - Cloud \u0026 hosting : OCI Always Free · GitHub Pages · (Azure Free Account — dropped) — limits: Free Tier Limits - Platform : k3s · Agones · Docker · Game Servers - Data (stretch) : MongoDB Atlas (leaderboard + DB observability) - Telemetry : OpenTelemetry · OTel Collector (the fan-out heart) - Backends : Dynatrace (Dynatrace SLOs · Dynatrace Workflows) · New Relic · Grafana Cloud · Elastic Stack - Load \u0026 chaos : k6 · chaos CronJob (in 03 Phase 2 — Cluster and Agones) - Analytics \u0026 AI : Databricks · Airflow and Astronomer · Gemini Chatbot - Optional second environment : Home Server Docker Stack (Plex/ arr — real workloads, strict privacy rules) Standing rules Personal accounts only · Santi pushes all commits · every phase ends with something visibly monitored · secrets never enter the repo (Secrets Hygiene) · when a session ends mid-work, update HANDOFF-STATE.md in the repo root."},{"p":"vault/01 Phase 0 — Free Tiers and Architecture.md","t":"Phase 0 — Free tiers \u0026 architecture ✅ (2026-07-06)","x":"Phase 0 — Free tiers \u0026 architecture ✅ (2026-07-06) Every free tier was verified against live vendor pages — numbers and sources in Free Tier Limits. The architecture (components, data flow, what-dies-when, €0 proof) is ARCHITECTURE.md in the repo root. The three findings that shaped the design 1. Dynatrace has no free tier — but Santi\u0027s tenant is free until 2026-10 , so the lab has a 3-month runway. Insurance: every tenant config is Terraform code, so a fresh trial tenant is a ~10-minute re-apply. 2. Azure Free Account VMs are ~1 GiB RAM — too small for k3s + Agones + Elastic Stack. Hence OCI Always Free hosts the cluster. (Post-script: Azure was then dropped entirely on 2026-07-06 — signup loop; HCP Terraform + GitHub Pages + New Relic synthetics took its jobs.) 3. Trial-then-fallback is the pattern for anything without a free tier: Airflow and Astronomer (14 days → local Astro CLI), Elastic Cloud (14 days → self-hosted Basic on the cluster). Decisions locked Public GitHub repo · OCI for compute · Logstash demo-only (Elastic Stack) · Gemini Chatbot on Gemini free tier with Groq fallback · alerts that actually fire live in Dynatrace, New Relic (email) and Grafana Cloud IRM — not Kibana (free connectors can\u0027t notify)."},{"p":"vault/02 Phase 1 — Accounts, Repo, State.md","t":"Phase 1 — Accounts, repo, state (effort: LOW — signups and boilerplate)","x":"Phase 1 — Accounts, repo, state (effort: LOW — signups and boilerplate) Goal: repo live on GitHub ✅, OCI account exists, Terraform remote state works (HCP Terraform). Azure was dropped 2026-07-06 — signup impossible (gmail/GitHub Microsoft-identity loop); replacements: HCP Terraform (state), GitHub Pages (site), New Relic synthetics (probes). Steps A. Repo — ✅ DONE 2026-07-06 Pushed to https://github.com/SScleves/personal-lab (public), gitleaks green, branch protection on, commit identity = personal (repo-local config). Laptop clone + Obsidian vault = step 7 if not done. Still pending on the work machine: winget install Python.Python.3.12 → pip install pre-commit → pre-commit install (Secrets Hygiene local guard). B. HCP Terraform (state backend) — HCP Terraform 1. https://app.terraform.io/public/signup/account → sign up with gmail (no card). 2. Create organization (e.g. sscleves-lab ) → create workspace lab (CLI-driven workflow). 3. Workspace → Settings → Execution Mode → Local (HCP holds state+locks; CI runs terraform). 4. User Settings → Tokens → create API token → GitHub secret TF_API_TOKEN (https://github.com/SScleves/personal-lab/settings/secrets/actions); locally: terraform login . 5. Uncomment the cloud {} block in terraform/envs/lab/backend.tf , set the org name, terraform init — remote state live. 📸 C. OCI (compute account) — OCI Always Free 6. Pick home region BEFORE signup (permanent; from NL: eu-marseille-1/eu-paris-1 quieter than eu-amsterdam-1). https://www.oracle.com/cloud/free/ — card for verification only. 7. Note which A1 free shape you get (4 OCPU/24 GB or 2/12) — it decides the Phase 2 layout. D. Site to GitHub Pages — GitHub Pages 8. Copy the Dutch-lessons site into a site/ folder (or its own repo) → Settings → Pages → deploy from branch (or the Pages action). URL live = the probe target for Phase 4 synthetics. Ends visibly monitored: gitleaks green ✅ + terraform plan/apply green against HCP state. Next: 03 Phase 2 — Cluster and Agones"},{"p":"vault/03 Phase 2 — Cluster and Agones.md","t":"Phase 2 — Cluster, game fleet, chaos (effort: MEDIUM/HIGH)","x":"Phase 2 — Cluster, game fleet, chaos (effort: MEDIUM/HIGH) Goal: k3s on the OCI Always Free VM, Agones managing a Game Servers fleet, a chaos CronJob killing gameservers on schedule. Ends visibly monitored: kubectl get gameservers shows kills and respawns happening on their own. Steps 1. Fill terraform/modules/oci-cluster : A1.Flex VM (4 OCPU/24 GB), VCN, security list — 22/tcp, 80/443/tcp, 7000-8000/udp (Agones port range), 6443/tcp restricted to home IP. 2. cloud-init: install k3s single-node ( curl -sfL https://get.k3s.io sh - ), copy kubeconfig → laptop ( ~/.kube/config , NEVER the repo — Secrets Hygiene). 3. PR → plan → merge → apply → kubectl get nodes from the laptop. 📸 4. Install Agones via Helm, version PINNED (arm64 is Alpha — see the ✅ verification section there). 5. Smoke test with the official simple-game-server Fleet (the one example guaranteed arm64) — kill a pod by hand, watch it respawn. Delete it. 6. Deploy the real fleet: agar.io-clone Fleet (2-3 replicas) + FleetAutoscaler — manifests and the Minecraft-Java option per Game Servers. 7. Join the game from the laptop — prove a human can play. 📸 8. Chaos CronJob ( /10 ): kill one allocated gameserver pod → watch Agones replace it. This loop is what Dynatrace SLOs will measure in Phase 3. 9. Also install the Elastic Stack (single-node ES + Kibana) now — it needs cluster RAM budgeted before anything else lands (~3 GB reserved). RAM budget (assume 12 GB — the possibly-shrunk free shape, OCI Always Free) k3s+system ~1.5 · Agones ~0.75 · agar.io fleet 3×0.3 · ES 2 (limit) + Kibana 1 · OTel Collector 0.3 (memory_limiter) ≈ 6.5 GB → ~5 GB headroom for k6 jobs and Phase 3. Minecraft Java (+2 GB) fits only as demo-day extra on 12 GB — or permanently if signup grants 24 GB. Next: 04 Phase 3 — OTel and Dynatrace"},{"p":"vault/04 Phase 3 — OTel and Dynatrace.md","t":"Phase 3 — Telemetry + Dynatrace SLOs/Workflows (effort: HIGH — the learning heart)","x":"Phase 3 — Telemetry + Dynatrace SLOs/Workflows (effort: HIGH — the learning heart) Goal: one instrumentation, four backends. Dynatrace SLOs burn when the chaos job kills a gameserver; a Dynatrace Workflows fires. Ends visibly monitored: a real alert lands during a real kill. Steps 1. Deploy the OTel Collector as the gateway: receivers (OTLP, k8s events, hostmetrics, filelog for game logs) → processors (k8sattributes, batch, memory_limiter) → exporters: Dynatrace OTLP, New Relic OTLP, Grafana Cloud OTLP, Elasticsearch. 2. Instrument the game wrapper + Dutch-site chatbot with OpenTelemetry SDKs; emit the two golden game metrics: tick duration and connect latency (see Game Servers). 3. terraform/modules/dynatrace-config : ingest token, SLOs (tick ≥ target, p95 connect \u003c target, chatbot p95), alerting profile, the Workflow (problem → notify + annotate + Agones allocation call). All code — the October tenant swap must be a re-apply, nothing manual (Dynatrace). 4. Trigger: let the chaos CronJob kill during a k6 swarm → SLO burns → problem → Workflow fires. 📸📸 5. Baseline dashboards in Kibana off the same data (Elastic Stack) for the pipeline-ownership story. Next: 05 Phase 4 — New Relic and Comparison"},{"p":"vault/05 Phase 4 — New Relic and Comparison.md","t":"Phase 4 — New Relic parallel + vendor comparison (setup LOW, comparison doc HIGH)","x":"Phase 4 — New Relic parallel + vendor comparison (setup LOW, comparison doc HIGH) Goal: same incident visible in Dynatrace, New Relic, Grafana Cloud and Kibana — then write the comparison doc (interview gold). Ends visibly monitored: New Relic emails an alert for the same kill Dynatrace caught. Steps 1. New Relic signup (free forever, no card) → OTLP license key → add exporter to the OTel Collector. Done — that\u0027s the whole \"setup\" (the fan-out design pays off here). 2. terraform/modules/newrelic-config FIRST JOB: drop rules + ingest alert at 50 GB — free tier hard-locks the whole UI if 100 GB is crossed (Free Tier Limits). 3. Parity dashboards: rebuild the two SLO views in New Relic and Grafana Cloud. 4. Run 07 Demo Script once; screenshot the same problem in all four backends (New Relic keeps traces only ~8 days — screenshot immediately). 5. The comparison doc: detection speed, problem-correlation quality, query language ergonomics (DQL vs NRQL vs LogQL/PromQL vs KQL), SLO modeling, alert routing, pricing model. One page per theme."},{"p":"vault/06 Phase 5 — Databricks, Airflow, AI.md","t":"Phase 5 — Databricks, Airflow, AI extras (effort: MEDIUM)","x":"Phase 5 — Databricks, Airflow, AI extras (effort: MEDIUM) Goal: the three job-offer differentiators. Ends visibly monitored: a Databricks dashboard over real lab telemetry, refreshed nightly by an Airflow DAG, and every chatbot LLM call traced. Steps 1. Databricks Free Edition signup (personal email, permanent) → create a Unity Catalog volume. 2. Export job: telemetry → Parquet (start dumb: a k8s CronJob on the cluster writing daily Parquet from the OTel Collector\u0027s file exporter, uploaded via Databricks SDK). 3. Airflow and Astronomer : start the 14-day Astro trial → build the DAG properly there (the export from step 2 becomes the DAG) → before day 14 export config → continue on local Astro CLI. 4. Databricks SQL: player-count vs latency vs SLO-burn analysis; one dashboard. 📸 5. Gemini Chatbot on the Dutch-lessons site: wrap every LLM call in OpenTelemetry spans (model, tokens, latency, error) → the \"AI observability\" interview story with real traces to show."},{"p":"vault/07 Demo Script.md","t":"🎬 Demo Script — the on-camera flow","x":"🎬 Demo Script — the on-camera flow The five minutes everything in this lab exists for. Rehearse until boring. 1. Cold open : terraform plan shows 0 changes — \"the entire estate, including every Dynatrace SLOs and Dynatrace Workflows, is this repo.\" 2. Load : launch the k6 player swarm → Agones FleetAutoscaler scales the fleet up ( kubectl get fleet -w on screen). 3. Chaos : kill an allocated gameserver pod mid-session (the chaos CronJob\u0027s command, run manually). 4. Detection : Dynatrace problem opens, SLO burn visible → Workflow fires: notification arrives, annotation lands, Agones allocation API called. Meanwhile Agones has replaced the pod — players reconnect. 5. Recovery : SLO recovers on screen. Flip to New Relic / Grafana Cloud / Kibana (Elastic Stack): same incident, four backends, one instrumentation (OTel Collector). 6. Close : the Databricks dashboard — \"and every night this telemetry becomes business insight.\" Props to prepare: split terminal (k9s + watch), four browser tabs pre-logged-in, phone showing the alert email. Failure modes rehearsed: k6 from laptop if cluster job fails; recorded backup run."},{"p":"vault/08 Month Plan.md","t":"🗓️ The Month Plan — 4 weeks + stretch, every tech with exercises","x":"🗓️ The Month Plan — 4 weeks + stretch, every tech with exercises Each week ends with something visibly monitored (the standing rule). Effort dial per week noted. Detailed clicks live in the phase notes; this is the schedule + the exercises that build skill, not just infrastructure. Signups: 09 Signup Checklist. Week 1 — Foundations: accounts, state, THE SERVER (effort: low, one design evening) Goal: terraform apply creates the OCI VM; k3s answers kubectl get nodes from the laptop. 1. Finish HCP Terraform (org sscleves-lab , workspace lab , Local mode, token → TF_API_TOKEN ) → uncomment cloud {} in backend.tf → terraform init ✅ green. 2. OCI signup (OCI Always Free — quiet region, note the A1 shape granted!). 3. Write + apply terraform/modules/oci-cluster : VCN, security list (22/tcp home-IP, 80/443/tcp, 7000-8000/udp, 6443/tcp home-IP), A1 VM, cloud-init installs k3s. 4. Server bring-up drill: SSH in → sudo systemctl status k3s → copy kubeconfig to laptop (NEVER the repo) → kubectl get nodes → 📸. 5. Dutch-lessons site → GitHub Pages (Phase 1 step D) — first workload live. Exercises — Terraform: terraform state list/show , then the confidence drill: terraform destroy the VM and re-apply it (cattle, not pets — same drill the October Dynatrace swap needs). k3s: deploy nginx, expose it, curl it from home, delete it. Week 2 — Kubernetes for real: Docker, Agones, chaos (effort: medium/high — the build week) Goal: the agar.io fleet self-heals on camera; chaos runs on a schedule. (03 Phase 2 — Cluster and Agones) 1. Docker exercises FIRST (they gate everything): build the agar.io-clone image arm64 via buildx, push to GHCR, run it on the cluster as a plain pod. 2. Install Agones (Helm, pinned) → simple-game-server smoke test → real Fleet + FleetAutoscaler (Game Servers). 3. Chaos CronJob live. Play the game from two browsers while it kills a pod. 📸 4. Elastic Stack onto the cluster (ES + Kibana, RAM-budgeted). Exercises — Agones: scale Fleet 2→5→2 by editing the manifest via PR (pipeline does it); kubectl delete pod an ALLOCATED gameserver vs a READY one — observe the difference. k3s: drain/uncordon the node; find where k3s logs live. Docker: shrink the game image (multi-stage, alpine) — measure before/after. Week 3 — Telemetry + Dynatrace: the learning heart (effort: HIGH, don\u0027t rush it) Goal: kill a gameserver → Dynatrace problem → Workflow fires → SLO burn visible. (04 Phase 3 — OTel and Dynatrace) 1. OTel Collector gateway with fan-out (Dynatrace + Grafana Cloud first; New Relic joins W4). 2. Instrument the game (OpenTelemetry): tick duration, WS RTT, player count. 3. dynatrace-config module: SLOs + alerting profile + the Workflow (Dynatrace SLOs, Dynatrace Workflows). 4. The full loop on camera, alert on the phone. 📸📸 Exercises — Dynatrace: write 5 DQL queries (worst tick p99 per pod; players vs latency correlation…); break the SLO on purpose with k6, watch the burn rate; the October drill : delete one SLO in the UI, re-apply from Terraform, confirm drift-free plan. Elastic Stack: same incident found via Kibana query; one Lens dashboard. OTel Collector: add the debug exporter, watch a span leave the game and arrive in two backends. Week 4 — The comparison + load: New Relic, k6, the demo (setup low, comparison-doc high) Goal: same incident in 4 backends; 07 Demo Script rehearsed start-to-finish. (05 Phase 4 — New Relic and Comparison) 1. New Relic signup + OTLP exporter + 50 GB guard first + synthetics pings on the site. 2. k6 player swarm (WS script, ramping VUs) → FleetAutoscaler scales on camera; results → Grafana. 3. Parity dashboards; write the vendor-comparison doc (DQL vs NRQL vs PromQL/LogQL vs KQL). 4. Full demo rehearsal. Record a backup run. Exercises — New Relic: rebuild 3 of your DQL queries in NRQL; force a drop rule and prove data stops. k6: find the fleet\u0027s breaking point — the VU count where tick p95 crosses the SLO; that number goes in the comparison doc. Grafana Cloud: annotate the chaos kill from the Dynatrace Workflow webhook. Stretch week(s) — analytics, AI, and the extras (06 Phase 5 — Databricks, Airflow, AI) - Databricks: telemetry Parquet → volume → Delta → SQL dashboard (exercise: player-count vs latency vs SLO-burn in one query). - Airflow and Astronomer: DAG locally → Astro trial 14 days → back to local (exercise: make the DAG idempotent — rerun yesterday safely). - Gemini Chatbot on the site + OTel spans per LLM call (exercise: a token-per-day metric and an SLO on p95 latency). Then the Azure AI Foundry trial on the banked account — same bot, second AI platform, comparison notes (Azure Free Account). - MongoDB Atlas: leaderboard for the game on M0 free (exercise: monitor Atlas metrics into the fan-out — database observability story). - Home Server Docker Stack: one collector container in the compose stack → Plex/ arr metrics in the same dashboards (exercise: alert on disk pressure before the disk fills). - Your two laptop games + website ideas: if either game can run headless in a container, it can join the fleet as workload 2 — same pattern, zero new concepts (Game Servers). Definition of done for the month The 07 Demo Script runs end-to-end without improvisation · every Dynatrace SLOs and Dynatrace Workflows is Terraform · the comparison doc exists with real screenshots · terraform destroy \u0026\u0026 terraform apply rebuilds the estate · every job-offer bullet has its artifact (mapping table in ARCHITECTURE.md )."},{"p":"vault/09 Signup Checklist.md","t":"✅ Signup Checklist — every account, one table","x":"✅ Signup Checklist — every account, one table Personal accounts ONLY. Card column = whether a credit card is ever seen. Usernames/emails are deliberately NOT in this public file (they live in the private session memory). Service URL Needed for Card? Status 2026-07-06 --- --- --- --- --- --- 1 GitHub (SScleves) github.com Repo, CI, Pages, GHCR images No ✅ done, repo live 2 HCP Terraform app.terraform.io Remote state + locking No 🟡 account made — finish org sscleves-lab , workspace lab , Local mode , token→ TF_API_TOKEN 3 OCI signup.cloud.oracle.com THE server (A1 ARM, k3s) Verify-only ⬜ next — quiet region! note A1 shape granted 4 Dynatrace (tenant exists) SLOs, Workflows No ✅ free until 2026-10 5 Grafana Cloud grafana.com → free OTLP backend, k6 results, IRM No ⬜ week 3 6 New Relic newrelic.com/signup Parallel backend, synthetics No ⬜ week 4 — set 50 GB guard on day one 7 Google AI Studio aistudio.google.com Gemini free API key (chatbot) No ⬜ stretch — plain Google login 8 Databricks Free Edition databricks.com/learn/free-edition Telemetry analytics No ⬜ stretch 9 Astronomer trial astronomer.io 14-day managed Airflow taste No ⬜ stretch — deleted day ~17, export first 10 MongoDB Atlas mongodb.com/cloud/atlas Game leaderboard (M0 free) No ⬜ stretch — ⚠️ verify M0 terms at signup 11 Groq console.groq.com Fallback LLM No ⬜ only if Gemini misbehaves 12 Azure (account exists) Phase 5 AI Foundry trial ONLY Yes (done) ✅ banked — never for infra — ~~GCP~~ — Nothing (Gemini = AI Studio) — ❌ rejected — ~~Elastic Cloud~~ elastic.co Optional 14-day familiarization No Optional; self-hosted is the real path Rule: sign up when the week needs it, not before — fewer live tokens, less standing surface (Secrets Hygiene). Every service\u0027s limits + where-they-bite: Free Tier Limits."},{"p":"vault/tech/Agones.md","t":"Agones","x":"Agones Google\u0027s open-source game-server orchestration for Kubernetes — real CV keyword, used by actual studios. Manages GameServer pods, Fleet s, and autoscaling. The self-heal star of 07 Demo Script: when the chaos job kills a gameserver, Agones replaces it while Dynatrace proves the detection. ✅ Verified 2026-07-06 (web, sources checked live) - Current stable v1.59.0 (2026-06-30), ~6-week cadence, k8s 1.33–1.35. - linux/arm64 images exist since v1.23 but arm64 is officially ALPHA (only amd64 is Stable) — matters because OCI Always Free is ARM. Mitigation: pin the version, smoke-test with simple-game-server (the one example image guaranteed arm64), upgrade deliberately. - k3s: known-working, unofficial (supported list is GKE/AKS/EKS/Minikube; Linode published a k3s+Agones+Xonotic guide). Fine for a lab. - GameServers use hostPort UDP 7000-8000 by default → open in VCN security list AND host iptables (k3s). Port range also caps concurrent servers on one node. - FleetAutoscaler : Buffer, Webhook, Chain, Schedule policies plus Counter/List (Beta, on by default) — true player-count scaling works, but the game must call the SDK counter APIs. On one node, over-scale just yields Pending pods (fine: that\u0027s a visible autoscaling story anyway). Install (Phase 2) Smoke test: deploy the official simple-game-server Fleet before any real game — Game Servers."},{"p":"vault/tech/Airflow and Astronomer.md","t":"Airflow \u0026 Astronomer","x":"Airflow \u0026 Astronomer Reuses what Santi already knows from work (Airflow 3) on a personal stage. One real DAG with a real purpose: the nightly telemetry → Parquet → Databricks load. Verified 2026-07-06 (Free Tier Limits) - Astro trial: 14 days AND $20 credit — the $20 is the real ceiling (~57 h of the smallest always-on deployment). No card. Deployment hard-deleted ~day 17 — export config before day 14. - No free hosted tier exists. Long-term path: local Astro CLI (free, Apache-2.0+Commons-Clause, astro dev start runs full Airflow in Docker — laptop or the home box, Home Server Docker Stack). Plan (Phase 5) 1. Build the DAG locally first (Astro CLI) — it must not depend on Astro-hosted features. 2. Start the trial → deploy the same DAG → screenshot the hosted experience (that\u0027s the familiarization goal) → export → back to local before day 14. 3. Instrument the DAG itself with OpenTelemetry (task duration, failure alerts via Dynatrace) — observing the orchestrator is its own job-offer bullet."},{"p":"vault/tech/Azure Free Account.md","t":"Azure Free Account — DROPPED 2026-07-06","x":"Azure Free Account — DROPPED 2026-07-06 Azure was designed in as the \"work-mirror\" (state blob, static site, probe VM) but the free-account signup proved impossible from Santi\u0027s identities: the gmail address is entangled with a GitHub-created Microsoft identity, and the signup loops forever on credential creation (a known failure mode of the \"Sign in with GitHub\" flow; even the pre-created-MSA path looped). What replaced it Azure job Replacement --- --- Terraform remote state HCP Terraform (free, no card, state + locking) Dutch-lessons site GitHub Pages Probe VM New Relic free synthetics (unlimited ping monitors) Net effect: one less account, one less card, no month-13 billing trap — the design got simpler. Plot twist (same day): account created after all — but the design stays zero-Azure A fresh outlook.com identity (created clean, never via GitHub) broke the signup loop and the account now EXISTS. Decision: keep the simpler zero-Azure wiring (HCP Terraform state, GitHub Pages, New Relic synthetics) and reserve the Azure account for Phase 5: an Azure AI Foundry trial on the Gemini Chatbot — the one job only Azure can do here (AI Foundry is the literal job-offer keyword). The Phase 0 Azure research in Free Tier Limits applies whenever that day comes. If the account is ever used for real resources: the month-13 billing trap and free-services-flow rules in the history of this note apply."},{"p":"vault/tech/Databricks.md","t":"Databricks","x":"Databricks The job-offer keyword made real: telemetry analytics on Free Edition (verified 2026-07-06 — permanent, personal email OK, replaced Community Edition in 2025). What free gives / where it bites (Free Tier Limits) Serverless-only: 1 SQL warehouse (2X-Small), notebooks, dashboards, Unity Catalog volumes . Daily fair-usage compute cutoff (exceed → compute off for the day). Ingest is file-shaped — no streaming endpoint, DBFS unavailable: land Parquet files in a UC volume, then COPY INTO /Auto Loader into Delta tables. The pipeline (Phase 5) 1. OTel Collector file exporter stages telemetry on the cluster. 2. Nightly DAG (Airflow and Astronomer): roll up → Parquet → upload via Databricks SDK → volume. 3. Delta table + SQL dashboard: player count vs latency vs SLO burn; incident table from Dynatrace Workflows step 4. This also solves the retention problem — Grafana Cloud keeps 14 days, New Relic traces 8; Databricks is the lab\u0027s long memory."},{"p":"vault/tech/Docker.md","t":"Docker","x":"Docker Everything on the cluster is a container, and the OCI Always Free server is ARM64 — so the one Docker skill this lab drills hard is multi-arch builds . Images live on GHCR (GitHub Container Registry — free for public repos, same login you already have). The build that matters (Week 2, gates the whole game fleet) Auth: docker login ghcr.io -u SScleves with a GitHub PAT ( write:packages scope) — the PAT is a secret (Secrets Hygiene): env var, never the repo. Exercises 1. The arm64 lesson : build the image WITHOUT --platform on your amd64 laptop, deploy to the cluster, watch exec format error in the pod logs — now you\u0027ve seen the bug the whole ARM constraint is about. Rebuild correctly. 2. Multi-stage shrink : node:22 → node:22-alpine multi-stage; measure image size before/after ( docker images ), and pod startup time — smaller images = faster Agones respawns, which is a real SLO input. 3. Read a Dockerfile like a reviewer : the itzg/minecraft-server Dockerfile — find where it handles multi-arch and what its healthcheck does. 4. Wire the build into GitHub Actions: on tag push, buildx + push to GHCR — the same plan/apply pedagogy, applied to images. Home context: your Home Server Docker Stack is compose-based amd64 — different arch, same concepts; the collector container you add there is exercise 4\u0027s image reused."},{"p":"vault/tech/Dynatrace SLOs.md","t":"Dynatrace SLOs","x":"Dynatrace SLOs Learning target 1. Game servers make SLOs visceral: latency isn\u0027t an abstract number, it\u0027s whether the game feels playable. The lab\u0027s SLOs (defined as code in dynatrace-config — Terraform) SLO SLI source Target Why it\u0027s a good story --- --- --- --- Game tick health game.tick.duration p95 \u003c 50 ms (OpenTelemetry) 99% Server-side quality — degrades under load BEFORE players notice Connect latency game.ws.rtt p95 \u003c 150 ms 99.5% The player-facing promise Chatbot latency Gemini Chatbot span p95 \u003c 3 s 95% The AI-observability SLO Site availability New Relic synthetic pings on the GitHub Pages site 99.9% Classic uptime, zero infra The demo mechanic (07 Demo Script) Chaos kill → connected players drop → error budget burns visibly → problem opens → Dynatrace Workflows fires → Agones replacement absorbs players → burn stops. Screenshot the burn-down curve: that picture IS the interview answer to \"explain error budgets.\" Design notes: choose evaluation windows short enough to see burn during a 5-min demo (fast-burn rate alert), long enough to be honest (7-day budget)."},{"p":"vault/tech/Dynatrace Workflows.md","t":"Dynatrace Workflows","x":"Dynatrace Workflows Learning target 2: problem → automated action. The honest version of the lab\u0027s \"self-healing\" story: Agones replaces killed gameservers on its own — the Workflow\u0027s job is everything around that: detect, notify, annotate, and prove closed-loop automation. The lab workflow (as code in dynatrace-config ) Trigger: problem event matching the game SLO alerting profile (Dynatrace SLOs). Steps: 1. Notify (email/webhook → phone on camera — 07 Demo Script). 2. Annotate: push a deployment/incident marker to Grafana Cloud so the comparison dashboards show the same moment. 3. Act: call the Agones allocation API / kubectl webhook to pre-warm a replacement gameserver — the closed loop. 4. (Stretch) Open a ticket-shaped record in a Databricks table — incident analytics later (Databricks). Cost/design rules (verified 2026-07-06) - Free inside the current tenant window (Dynatrace). On paid DPS: standing standard workflow ≈ $22/mo just existing; simple workflows (1 trigger + 1 action) ≈ free. - Keep the lab\u0027s always-on workflow SIMPLE-class if possible; standard ones get created for demo days and destroyed after — trivial because they\u0027re Terraform resources."},{"p":"vault/tech/Dynatrace.md","t":"Dynatrace","x":"Dynatrace The primary backend and the primary learning target: Dynatrace SLOs + Dynatrace Workflows. Tenant situation (the fact that shapes everything) - Santi\u0027s personal tenant is free until 2026-10 — the whole build window fits inside it. - Verified 2026-07-06: after any tenant expires, UI/ingest block immediately and the tenant is permanently deleted 30 days later . No free tier, no self-serve cheap plan exists for individuals. - Therefore: the tenant is cattle, not a pet. Every SLO, workflow, alerting profile, tag rule and token lives in terraform/modules/dynatrace-config (Terraform). Post-October: new 15-day trial → re-apply → back in ~10 minutes. Rehearse the drill once before October. Ingest (Phase 3) OTLP from the OTel Collector: https://\u003cenv .live.dynatrace.com/api/v2/otlp — token with openTelemetryTrace.ingest , metrics.ingest , logs.ingest scopes, minted in the tenant, stored as k8s secret via Terraform (Secrets Hygiene). Optional later: OneAgent-operator for the deep k8s view — heavier; start OTLP-only. Cost awareness (matters post-October or on any paid tenant) On paid DPS a standing \"standard\" workflow bills ~$22/month just for existing ; \"simple\" workflows (single trigger+action) are free apart from per-invocation pennies. Design lab workflows as simple where possible; create/delete standard ones around demos."},{"p":"vault/tech/Elastic Stack.md","t":"Elastic Stack (self-hosted, free Basic)","x":"Elastic Stack (self-hosted, free Basic) The \"I ran my own pipeline\" story: ES + Kibana on the k3s cluster, fed by the OTel Collector. Verified 2026-07-06: free Basic license covers ES, Kibana, OTLP/APM ingest, and basic alerting — self-hosted, forever (Elastic is AGPL-optioned open source again since 2024). RAM reality (why this took design work) ES 2 GB container/1 GB heap floor + Kibana ~1 GB. Fits the OCI budget only because it was reserved in 03 Phase 2 — Cluster and Agones. Logstash JVM wants 4-8 GB → demo-days only : spin it up, learn pipelines, tear down. Daily log shipping = Filebeat or the collector\u0027s elasticsearch exporter. Known free-tier limits (don\u0027t fight them, document them) - Alert connectors on free = write-to-index + server-log only — no email/Slack. The alerts that fire live in Dynatrace/New Relic/Grafana Cloud; Kibana shows detection parity instead. - No ML anomaly detection (paid). OpenSearch alternative has free alerting but same RAM appetite — noted, not chosen (Elastic is the CV keyword). Elastic Cloud trial (optional familiarization) 14 days, no card, data deleted ~day 44 — the trial-then-self-host pattern: use it to learn Fleet/managed UX, never depend on it."},{"p":"vault/tech/Free Tier Limits.md","t":"Free Tier Limits — verified 2026-07-06 via live vendor pages","x":"Free Tier Limits — verified 2026-07-06 via live vendor pages The Phase 0 research table. Re-verify anything here before relying on it after ~2026-Q4. Service Free offer Expiry Where it bites --- --- --- --- Azure Free Account ~~$200/30d + 12-mo + always-free~~ DROPPED (signup loop) — Research kept for a possible future AI Foundry trial HCP Terraform 500 managed resources, state+locking, no card (✅ verified) Never Over-cap = blocked runs, not a bill; 1 concurrent run (irrelevant solo) GitHub Pages Free static hosting on public repos (✅ verified) Never 100 GB/mo soft bandwidth, 1 GB site; static only (chatbot API lives on the cluster) OCI Always Free ARM A1: 4 OCPU/24 GB — possibly cut to 2/12 June 2026 (unofficial) Never Verify shape at signup; capacity scarcity; home region permanent; PAYG upgrade = priority + maybe 4/24 Dynatrace Santi\u0027s tenant to 2026-10; else 15-day trials 2026-10 Tenant deleted 30d post-expiry → all config as Terraform code; paid standing std workflow ≈$22/mo New Relic 100 GB/mo + 1 full user, no card Never Overage = full lockout till month end → 50 GB guard; traces ~8d retention Grafana Cloud 10k series, 50 GB logs, 50 GB traces, OTLP, IRM, 500 k6 VUh Never 14-day retention; series-cap blowouts Elastic Stack self-hosted Basic license: ES+Kibana+APM/OTLP+basic alerting Never ~8 GB RAM realistic floor; free connectors can\u0027t email/Slack; Logstash JVM 4-8 GB Elastic Cloud 14-day trial, no card d14; data gone d~44 Eval only; cheapest paid ~$99/mo Databricks Free Edition Permanent, personal email, 2X-Small WH, UC volumes Never Daily fair-use compute cutoff; file-shaped ingest only Airflow and Astronomer 14 days AND $20 credit ~d14; deleted d~17 $20 ≈ 57 h always-on smallest deployment; export before expiry → local Astro CLI GitHub Actions Public repos: unlimited minutes + branch protection Never Private: 2,000 min/mo, no branch protection on free Gemini Chatbot Flash models free, no card Never Exact RPM/RPD now dashboard-only (AI Studio); free data may train Google models Groq (fallback LLM) 30 RPM / 14.4k RPD (8B model), no card Never TPM caps on long prompts; model lineup churns Flagged as unverified at research time: OCI exact terms (verify at signup) · Dynatrace re-trial eligibility (community lore) · Azure itemized always-free list (marketing pages fetch-blocked; Learn pages confirmed the load-bearing numbers)."},{"p":"vault/tech/Game Servers.md","t":"Game Servers","x":"Game Servers What the lab observes and auto-heals. Verified 2026-07-06 for ARM64 (the OCI Always Free constraint). The line-up (in deployment order) 1. simple-game-server (Agones official example) — guaranteed arm64, UDP echo. Pure smoke test for Agones; deploy first, delete after. 2. agar.io-clone (owenashurst/agar.io-clone, MIT, Node.js + Socket.IO) — the MVP fleet . Node is arm64-native, Dockerfile included, WebSocket transport means k6 load-tests it NATIVELY (k6 has no UDP). Instrument the server loop ourselves with OpenTelemetry: tick duration + WS round-trip latency → the two Dynatrace SLOs. Bots = simple WS scripts. 3. Minecraft Java ( itzg/minecraft-server , multi-arch arm64) — the recognizable demo piece. ~2 GB RAM vanilla; run as a second, smaller Fleet or demo-days only if RAM is tight (see budget in 03 Phase 2 — Cluster and Agones). Load: Minecraft bot library, not k6. Player-count autoscaling needs a small sidecar calling the Agones SDK counter API. Avoid (verified) - Minecraft Bedrock on ARM: x86-only binaries, runs via box64 emulation with known illegal-instruction bugs. Java only. - Xonotic / SuperTuxKart example images : arm64 manifests unverified — assume amd64-only unless docker manifest inspect proves otherwise. - saulmaldonado/agones-minecraft : abandoned (2021, GKE-specific) — reference architecture only. Also observed (non-game workloads) - Dutch-lessons site + Gemini Chatbot (Azure static hosting). - Optional: the home Home Server Docker Stack (Plex/ arr) as a second real environment."},{"p":"vault/tech/Gemini Chatbot.md","t":"Gemini Chatbot — the AI-observability story","x":"Gemini Chatbot — the AI-observability story A small Dutch-lessons chatbot (practice-sentence generator / vocab quizzer) on the existing site, backed by a free-tier LLM, instrumented end-to-end. This is the \"AI observability / AI Foundry\" interview material: real traces of real LLM calls. LLM choice (verified 2026-07-06 — Free Tier Limits) - Primary: Gemini Flash class — free tier, Google account only, no card, no expiry. Exact RPM/RPD now live only in the AI Studio dashboard — check after signup. Free-tier prompts may train Google models: fine for Dutch grammar, never paste anything personal. - Fallback: Groq (llama-3.1-8b: 30 RPM / 14.4k req-day, published limits, OpenAI-compatible — the OpenTelemetry wrapper stays identical). - No Anthropic free tier exists; Mistral\u0027s limits are unpublished — both rejected in Phase 0. Instrumentation (Phase 5, the point of the exercise) Span per LLM call: model, prompt/completion tokens, latency, error class, (opt-in) truncated prompt. Metrics: llm.request.duration p95 → its own SLO (Dynatrace SLOs), token counts per day (a cost-shaped metric even at €0 — that\u0027s the FinOps-flavored talking point). k6 gives it gentle load for the demo. API key: serverless env var, never the repo (Secrets Hygiene)."},{"p":"vault/tech/GitHub Actions.md","t":"GitHub Actions","x":"GitHub Actions CI for the lab, mirroring the work pattern: plan on PR, apply on main ( .github/workflows/terraform.yml ) plus gitleaks on every push ( gitleaks.yml — Secrets Hygiene). Why the repo is public Verified 2026-07-06 (Free Tier Limits): public repos get unlimited standard-runner minutes AND branch protection on the free plan; private repos get 2,000 min/month and no branch protection. Public also = portfolio. Consequence: secrets hygiene is non-negotiable from commit 1. Secrets needed (Settings → Secrets → Actions) Phase 1: TF_API_TOKEN (HCP Terraform user token — state read/write). Phase 2: OCI auth. Phase 3+: DYNATRACE_API_TOKEN , NEW_RELIC_API_KEY , GRAFANA_CLOUD_TOKEN ; GHCR image pushes use a PAT with write:packages (Docker). Add per phase, never earlier — least privilege, least standing surface."},{"p":"vault/tech/GitHub Pages.md","t":"GitHub Pages","x":"GitHub Pages Hosts the Dutch-lessons site (static) — replaced Azure static hosting in the zero-Azure rewire (2026-07-06). Free on public repos, custom domains supported, ~100 GB/month soft bandwidth cap — a language-lessons site won\u0027t scratch it. Setup (Phase 1 step D) Site files → repo (own repo or site/ folder) → Settings → Pages → deploy from branch, or the actions/deploy-pages workflow for build steps. The published URL becomes: - the Gemini Chatbot\u0027s home (chatbot calls its API endpoint — note: Pages is static-only, so the chatbot API itself runs elsewhere: a tiny endpoint on the k3s cluster behind HTTPS). - the target for New Relic free synthetic ping monitors (Phase 4) — the site-availability SLO (Dynatrace SLOs) gets its data without any probe VM."},{"p":"vault/tech/Grafana Cloud.md","t":"Grafana Cloud","x":"Grafana Cloud The backend that survives everything — free forever, native OTLP, and the eventual home of the lab\u0027s long-running dashboards (it outlives the Dynatrace October cliff). Verified 2026-07-06 (Free Tier Limits) - 10k active metric series · 50 GB logs · 50 GB traces · 3 users · 14-day retention · IRM (alerting/on-call) included · 500 k6 cloud VUh/month . - The cap that bites first: 10k series — one over-labeled exporter blows it (cardinality rules in OpenTelemetry). - 14-day retention = no long-term trends; the long-memory story lives in Databricks instead. Setup (Phase 3 exporter, Phase 4 dashboards) OTLP gateway endpoint + token from the stack\u0027s \"OpenTelemetry\" connection page → k8s secret → exporter in OTel Collector. grafana-cloud Terraform module manages dashboards-as-code and one IRM alert route. k6 results stream here for the on-camera load graphs (07 Demo Script)."},{"p":"vault/tech/HCP Terraform.md","t":"HCP Terraform (Terraform Cloud)","x":"HCP Terraform (Terraform Cloud) The lab\u0027s remote-state backend — replaced Azure blob storage when the Azure signup proved impossible (2026-07-06). Arguably the better outcome: HCP Terraform is itself CV-relevant, and state + locking + a web UI for run history come free. Setup (Phase 1 step B — full clicks in 02 Phase 1 — Accounts, Repo, State) Org + workspace lab + Local execution mode (HCP stores state and locks; GitHub Actions and the laptop run terraform). Auth: user API token → TF_API_TOKEN GitHub secret + terraform login locally. The cloud {} block lives in terraform/envs/lab/backend.tf . Free tier — ✅ verified 2026-07-06 (live docs) - 500 managed resources free (resources in state; data sources/null_resource don\u0027t count), unlimited users/workspaces, 1 concurrent run, remote state + locking + VCS integration included. No time expiry. (The legacy free plan hit EOL 2026-03-31; new signups land on the current 500-resource free tier directly.) - No card at signup (email or GitHub identity; card only enters if you actively activate pay-as-you-go). Over 500 resources with no card = blocked runs, not a bill . - Local execution mode confirmed: Settings → General → Execution Mode → Local — HCP stores state/locks only. CI token needs state read/write; cloud {} block is the current syntax (Terraform ≥ 1.1), backend \"remote\" is legacy. - Ignore the \"$500 HCP trial credits\" banner at signup — that\u0027s a separate 6-month HCP-platform trial; the 500-resource free allowance is the permanent thing the lab uses. The lab is a handful of resources — ~1% of the cap. This limit will never bite. Why local execution mode Remote execution would run terraform on HCP\u0027s runners — then OCI/Dynatrace credentials would have to live in HCP too. Local mode keeps all credentials in one place (GitHub Actions secrets) and HCP touches only state. One secret store, smaller surface (Secrets Hygiene)."},{"p":"vault/tech/Home Server Docker Stack.md","t":"Home Server Docker Stack (Plex / *arr / qBittorrent)","x":"Home Server Docker Stack (Plex / arr / qBittorrent) Santi\u0027s existing Linux Docker host: Plex, Jellyseerr, Radarr, Sonarr, Prowlarr, qBittorrent. Optional lab extension — a second, REAL environment to observe with zero new cost. Why it earns a place - Real workloads with real failure modes (disk pressure, container restarts, transcode CPU spikes) — better war stories than synthetic chaos. - One more OTel Collector (or Grafana Alloy) as a container in the existing compose stack: container metrics (cAdvisor/docker stats), host metrics, app logs → the same backends. Demonstrates multi-environment fleet observability — a genuine job-offer bullet. - Could also host local Airflow and Astronomer Airflow if the laptop shouldn\u0027t run Docker 24/7. Rules (stricter than the rest — this is the home network) - Nothing about this box in the public repo : no IPs, no hostnames, no compose files with paths/ports. Keep its config in a PRIVATE repo or local-only (Secrets Hygiene). - Egress-only telemetry (collector pushes out); zero inbound ports opened for the lab. - Watch ingest volume: Plex + arr logs are chatty — New Relic\u0027s 100 GB and the 50 GB guard apply here too. Sample/filter at the collector. When Anytime — it\u0027s independent of the OCI cluster and can run as a parallel track from the laptop. How The laptop\u0027s Claude follows HOME-SERVER-MISSION.md (repo root) — 4 milestones: metrics to both backends → filtered logs → alerts (disk pressure, container down, transcode spike) → OneAgent-vs-OTel comparison. All host-specific files stay in ~/observability/ , outside this repo."},{"p":"vault/tech/k3s.md","t":"k3s","x":"k3s Single-binary Kubernetes; one server node on the OCI Always Free VM. Chosen over AKS because AKS nodes are paid VMs — k3s on free compute is the only €0 Kubernetes (Azure Free Account). Install (Phase 2, via cloud-init in terraform/modules/oci-cluster ) Minimums: 2 cores / 2 GB for the server (docs.k3s.io) — trivial on the A1 shape. Lab-specific notes - Agones on k3s is community-proven (Linode\u0027s Xonotic guide) but NOT officially supported — pin versions, expect to debug alone. - Traefik ships by default — fine for the site/chatbot ingress; game traffic bypasses it (hostPort UDP/WS via Agones). - Firewall, twice : game ports must be open in the OCI VCN security list AND in the instance\u0027s iptables — Oracle\u0027s Ubuntu images ship restrictive host rules that silently eat UDP. 1 failure mode. - Observability: OTel Collector runs as a deployment here; k8s events + kubelet metrics feed Dynatrace / New Relic k8s views."},{"p":"vault/tech/k6.md","t":"k6","x":"k6 Grafana\u0027s load-testing tool — the \"player swarm\" generator for 07 Demo Script step 2. Verified 2026-07-06 - OSS (AGPL-3.0), free; native arm64 binaries and Docker images — runs on the OCI Always Free cluster or the laptop. - Protocols: HTTP, WebSockets , gRPC, browser. No UDP in core (xk6-udp extensions exist but are tiny community projects — avoid). - Grafana Cloud free tier includes 500 k6 cloud VUh/month — stream local-run results there for pretty on-camera dashboards. Consequences for the lab - The agar.io-clone fleet (WebSocket — Game Servers) is k6-testable natively: ramping VUs that connect, move, disconnect = FleetAutoscaler trigger + latency SLO load. - Minecraft is NOT k6 territory (raw UDP/TCP game protocol) — use a Minecraft bot library; k6 can still probe its TCP status port for a liveness check. - Also load-test the Gemini Chatbot HTTP endpoint (gently — free-tier RPM limits, Free Tier Limits)."},{"p":"vault/tech/MongoDB Atlas.md","t":"MongoDB Atlas (stretch — game leaderboard + database observability)","x":"MongoDB Atlas (stretch — game leaderboard + database observability) The game needs one stateful thing to make persistence real: a leaderboard . Atlas M0 gives a managed MongoDB free, and monitoring a real database turns into its own observability exercise. Free tier — ⚠️ NOT yet verified by a live check (do it at signup) Community-known M0 terms: 512 MB storage, shared vCPU/RAM, 3-node replica set, deployable on AWS/Azure/GCP regions, free forever, no card. Verify on mongodb.com/pricing before relying on numbers — this note was written from secondary sources, unlike the rest of Free Tier Limits. The build (1 evening) 1. Atlas signup (gmail) → M0 cluster in a nearby EU region → database user + IP allowlist (the OCI VM\u0027s egress IP only — never 0.0.0.0/0). 2. Connection string → k8s secret via Terraform (Secrets Hygiene). 3. agar.io-clone: top-10 scores collection, write on player death, read on lobby join. Exercises 1. Instrument the Mongo driver calls with OpenTelemetry spans — now a game trace shows game → leaderboard.write → Atlas end-to-end; find the slowest query in Dynatrace. 2. Atlas\u0027s built-in metrics vs your OTel view: what does each see that the other can\u0027t? (One paragraph in the vendor-comparison doc.) 3. Chaos extra: block Atlas egress for 60 s (security-list rule) — does the game degrade gracefully? Does an SLO catch it? (Dynatrace SLOs)"},{"p":"vault/tech/New Relic.md","t":"New Relic","x":"New Relic The standing free backend (forever, no card) and the vendor-comparison counterpart to Dynatrace. Verified 2026-07-06 (Free Tier Limits) - 100 GB ingest/month + 1 Full Platform user + unlimited basic users. APM, logs, k8s, dashboards, synthetics, email alerts all included. - Overage = hard lockout of the whole platform until the 1st of next month (no bill — no card on file). A runaway debug-log loop locks you out mid-demo-prep. - Trace retention ~8 days → screenshot demo evidence immediately. Setup order (Phase 4 — deliberately after the guard rails exist) 1. OTLP exporter in the OTel Collector ( otlp.nr-data.net , license key via k8s secret). 2. newrelic-config module (Terraform): NRQL drop rules for chatty k8s namespaces + ingest alert at 50 GB — before any dashboard work. 3. Synthetics (✅ verified 2026-07-06): simple ping monitors don\u0027t consume any check quota — these ARE the lab\u0027s uptime probes (GitHub Pages site + game endpoints), down to 1-min cadence. ⚠️ Non-ping (browser/scripted) monitors get only 500 free checks/month — a single 5-min browser monitor burns ~8,900/mo. Ping only. 4. Parity dashboards mirroring the Dynatrace SLOs views → raw material for the comparison doc (05 Phase 4 — New Relic and Comparison)."},{"p":"vault/tech/OCI Always Free.md","t":"OCI Always Free","x":"OCI Always Free Role in the lab: the muscle — one Ampere A1 ARM VM (up to 4 OCPU / 24 GB / 200 GB boot volume, free forever) hosting k3s + Agones + Game Servers + Elastic Stack + OTel Collector. Chosen because it\u0027s the only €0 host with enough RAM (01 Phase 0 — Free Tiers and Architecture). Gotchas - Home region is permanent — choose before signup; quieter regions have better free-ARM availability. - \"Out of host capacity\" for free A1 instances is a known 2026 issue in busy regions: retry (script it), or upgrade the account to PAYG while staying inside always-free shapes — reportedly improves placement priority. Card required at signup either way (verification only). - Everything is ARM64 — every container image on the cluster must be linux/arm64 (see the verification section in Agones and Game Servers). - Terraform module: terraform/modules/oci-cluster — ports 22, 80/443, 7000-8000/udp, 6443 (home IP only). - Retry helper if capacity blocks: hitrov/oci-arm-host-capacity (script the instance-create loop). ⚠️ Verified 2026-07-06 — the free tier may have SHRUNK A June-2026 change (reported by users, silently edited docs, no official announcement ) cuts always-free A1 from 4 OCPU/24 GB to 2 OCPU/12 GB ; PAYG-upgraded accounts reportedly keep 4/24 plus priority capacity. Single-source + inconsistent Oracle support answers — check docs.oracle.com/iaas/Content/FreeTier at signup and correct this note. Design consequence: the lab\u0027s RAM budget assumes 12 GB (03 Phase 2 — Cluster and Agones); if signup shows 24 GB, everything gets roomier, not tighter. PAYG upgrade (card already on file, still €0 within free shapes) is the sanctioned fix for both capacity and the bigger shape."},{"p":"vault/tech/OpenTelemetry.md","t":"OpenTelemetry","x":"OpenTelemetry The vendor-neutral instrumentation layer — the reason four backends cost one integration effort. SDKs in the workloads emit OTLP → the OTel Collector fans out. What gets instrumented (Phase 3) Workload Signals The metrics that matter --- --- --- agar.io-clone server (Game Servers) traces, metrics, logs game.tick.duration , game.ws.rtt , game.players.active Gemini Chatbot traces (span per LLM call), metrics model, token counts, latency, error class — the AI-observability story k3s cluster k8s events, kubelet/host metrics pod restarts (the chaos signal), node saturation Dutch-lessons site (GitHub Pages) HTTP probes availability, TTFB (New Relic synthetic pings) Conventions (the \"standards\" job bullet — decide once, enforce in code review) - Resource attributes on everything: service.name , service.version , deployment.environment=lab . - Metric names: game. namespace, seconds/base units, low-cardinality labels (a runaway label blows Grafana Cloud\u0027s 10k-series cap first). - Node SDK for the game (auto-instrumentation + manual spans around the tick loop). Backends: Dynatrace · New Relic · Grafana Cloud · Elastic Stack — all take OTLP."},{"p":"vault/tech/OTel Collector.md","t":"OTel Collector","x":"OTel Collector The fan-out heart: one deployment on k3s, receiving everything, exporting everywhere. Kill this pod and ALL backends go dark — which is itself a good demo of pipeline observability (monitor the collector\u0027s own metrics). Pipeline sketch (Phase 3, contrib distribution — arm64 images exist) Rules - memory_limiter FIRST in every pipeline (~300 MB cap — the RAM budget in 03 Phase 2 — Cluster and Agones depends on it). - Backend tokens live in k8s secrets created by Terraform, never in the committed collector config (Secrets Hygiene). - One backend down must not block the others: per-exporter sending queues + retry on their own."},{"p":"vault/tech/Secrets Hygiene.md","t":"Secrets Hygiene","x":"Secrets Hygiene Hard-learned lesson (a token was once committed at work before scanning existed). This repo is PUBLIC — the rules are absolute, boring, and enforced by machines, not memory. The layers 1. pre-commit gitleaks ( .pre-commit-config.yaml ) — blocks the commit locally. pip install pre-commit \u0026\u0026 pre-commit install once per clone (Phase 1 step 2). 2. CI gitleaks ( .github/workflows/gitleaks.yml ) — full-history scan on every push, catches machines that skipped step 1. 3. .gitignore — .tfvars , keys, kubeconfigs, .env can\u0027t be staged by accident. 4. Where secrets actually live : GitHub Actions secrets (CI) · k8s secrets created by Terraform from variables passed at apply time (backends\u0027 tokens) · AI Studio/console dashboards (LLM keys) · laptop ~/.kube/config . If a secret leaks anyway Rotate FIRST (the provider console), then clean history ( git filter-repo ), then force-push. Rotation beats history-scrubbing every time — the internet already cached the push. Extra rule for the public repo: no home IPs, no home-network details in committed configs — applies especially to Home Server Docker Stack notes."},{"p":"vault/tech/Terraform.md","t":"Terraform","x":"Terraform The spine of the lab: clouds, cluster bootstrap, AND all observability config (Dynatrace, New Relic, Grafana Cloud) are code. Same discipline as work, personal scale. Layout (repo terraform/ ) - envs/lab/ — the single environment; modules enabled phase by phase in main.tf . - modules/oci-cluster · dynatrace-config · newrelic-config · grafana-cloud — each README says what belongs in it and its gotchas. State backend: HCP Terraform (no bootstrap chicken-and-egg) Create org + workspace lab in the HCP UI (Phase 1 step B), set Local execution mode, uncomment the cloud {} block in envs/lab/backend.tf , terraform init — done. No storage infra to pre-create (this replaced the Azure blob design, 2026-07-06). Rules - Providers pinned in providers.tf ; bump deliberately. - No secrets in .tf or state-committed values echoed — tokens via env vars / CI secrets (Secrets Hygiene). - LRS not GRS, versioning off (the €0 rule); terraform fmt enforced pre-commit and in GitHub Actions. - The October drill : dynatrace-config must fully rebuild a fresh tenant. Practice once before 2026-10."}];
const GH = "https://github.com/SScleves/personal-lab/blob/main/";
const q = document.getElementById("q"), out = document.getElementById("results"),
      count = document.getElementById("count");
function esc(s){ return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function search(term){
  const words = term.toLowerCase().split(/\s+/).filter(w => w.length > 1);
  if (!words.length){ out.innerHTML=""; count.textContent = DOCS.length + " documents indexed"; return; }
  const scored = [];
  for (const d of DOCS){
    const t = d.t.toLowerCase(), x = d.x.toLowerCase();
    let score = 0, allFound = true;
    for (const w of words){
      const inT = t.includes(w), nX = x.split(w).length - 1;
      if (!inT && nX === 0){ allFound = false; break; }
      score += (inT ? 30 : 0) + Math.min(nX, 10) * 3;
    }
    if (allFound) scored.push([score, d]);
  }
  scored.sort((a,b) => b[0]-a[0]);
  count.textContent = scored.length + " result" + (scored.length===1?"":"s");
  out.innerHTML = scored.slice(0, 40).map(([s, d]) => {
    const x = d.x, lx = x.toLowerCase();
    let i = lx.indexOf(words[0]); if (i < 0) i = 0;
    const a = Math.max(0, i - 80);
    let snip = esc(x.slice(a, a + 240));
    for (const w of words)
      snip = snip.replace(new RegExp("("+w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"), "<b>$1</b>");
    return '<div class="hit"><a href="' + GH + encodeURI(d.p) + '" target="_blank">' + esc(d.t) +
           '</a><div class="path">' + esc(d.p) + '</div><div class="snip">…' + snip + '…</div></div>';
  }).join("");
}
q.addEventListener("input", () => search(q.value));
search("");
</script>
