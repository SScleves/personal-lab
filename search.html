t-first (the exact philosophy from work: import existing things, plan to zero, then manage as code). The module skeleton + import example exists; needs a PAT ( repo scope) as GITHUB_TOKEN . Content (book text, notes, HTML) stays in git as files — Terraform manages settings , not words. 7. Troubleshooting — today\u0027s greatest hits Symptom Cause → fix --- --- Repository not found on push Repo never created on github.com → create at github.com/new, then push Site 404 after push Pages not enabled → Settings → Pages → deploy from branch Commit shows work email Repo-local identity not set → set it, git commit --amend --reset-author BEFORE pushing rejected (non-fast-forward) Another machine pushed first → git pull , then push Actions tab shows red Open the run, read the first failing step — usually a missing secret"},{"p":"vault/tech/GitHub Pages.md","t":"GitHub Pages","x":"GitHub Pages Hosts the Dutch-lessons site (static) — replaced Azure static hosting in the zero-Azure rewire (2026-07-06). Free on public repos, custom domains supported, ~100 GB/month soft bandwidth cap — a language-lessons site won\u0027t scratch it. Setup (Phase 1 step D) Site files → repo (own repo or site/ folder) → Settings → Pages → deploy from branch, or the actions/deploy-pages workflow for build steps. The published URL becomes: - the Gemini Chatbot\u0027s home (chatbot calls its API endpoint — note: Pages is static-only, so the chatbot API itself runs elsewhere: a tiny endpoint on the k3s cluster behind HTTPS). - the target for New Relic free synthetic ping monitors (Phase 4) — the site-availability SLO (Dynatrace SLOs) gets its data without any probe VM."},{"p":"vault/tech/Grafana Cloud.md","t":"Grafana Cloud","x":"Grafana Cloud The backend that survives everything — free forever, native OTLP, and the eventual home of the lab\u0027s long-running dashboards (it outlives the Dynatrace October cliff). Verified 2026-07-06 (Free Tier Limits) - 10k active metric series · 50 GB logs · 50 GB traces · 3 users · 14-day retention · IRM (alerting/on-call) included · 500 k6 cloud VUh/month . - The cap that bites first: 10k series — one over-labeled exporter blows it (cardinality rules in OpenTelemetry). - 14-day retention = no long-term trends; the long-memory story lives in Databricks instead. Setup (Phase 3 exporter, Phase 4 dashboards) OTLP gateway endpoint + token from the stack\u0027s \"OpenTelemetry\" connection page → k8s secret → exporter in OTel Collector. grafana-cloud Terraform module manages dashboards-as-code and one IRM alert route. k6 results stream here for the on-camera load graphs (07 Demo Script)."},{"p":"vault/tech/HCP Terraform.md","t":"HCP Terraform (Terraform Cloud)","x":"HCP Terraform (Terraform Cloud) The lab\u0027s remote-state backend — replaced Azure blob storage when the Azure signup proved impossible (2026-07-06). Arguably the better outcome: HCP Terraform is itself CV-relevant, and state + locking + a web UI for run history come free. Setup (Phase 1 step B — full clicks in 02 Phase 1 — Accounts, Repo, State) Org + workspace lab + Local execution mode (HCP stores state and locks; GitHub Actions and the laptop run terraform). Auth: user API token → TF_API_TOKEN GitHub secret + terraform login locally. The cloud {} block lives in terraform/envs/lab/backend.tf . Free tier — ✅ verified 2026-07-06 (live docs) - 500 managed resources free (resources in state; data sources/null_resource don\u0027t count), unlimited users/workspaces, 1 concurrent run, remote state + locking + VCS integration included. No time expiry. (The legacy free plan hit EOL 2026-03-31; new signups land on the current 500-resource free tier directly.) - No card at signup (email or GitHub identity; card only enters if you actively activate pay-as-you-go). Over 500 resources with no card = blocked runs, not a bill . - Local execution mode confirmed: Settings → General → Execution Mode → Local — HCP stores state/locks only. CI token needs state read/write; cloud {} block is the current syntax (Terraform ≥ 1.1), backend \"remote\" is legacy. - Ignore the \"$500 HCP trial credits\" banner at signup — that\u0027s a separate 6-month HCP-platform trial; the 500-resource free allowance is the permanent thing the lab uses. The lab is a handful of resources — ~1% of the cap. This limit will never bite. Why local execution mode Remote execution would run terraform on HCP\u0027s runners — then OCI/Dynatrace credentials would have to live in HCP too. Local mode keeps all credentials in one place (GitHub Actions secrets) and HCP touches only state. One secret store, smaller surface (Secrets Hygiene)."},{"p":"vault/tech/Home Server Docker Stack.md","t":"Home Server Docker Stack (Plex / *arr / qBittorrent)","x":"Home Server Docker Stack (Plex / arr / qBittorrent) Santi\u0027s existing Linux Docker host: Plex, Jellyseerr, Radarr, Sonarr, Prowlarr, qBittorrent. Optional lab extension — a second, REAL environment to observe with zero new cost. Why it earns a place - Real workloads with real failure modes (disk pressure, container restarts, transcode CPU spikes) — better war stories than synthetic chaos. - One more OTel Collector (or Grafana Alloy) as a container in the existing compose stack: container metrics (cAdvisor/docker stats), host metrics, app logs → the same backends. Demonstrates multi-environment fleet observability — a genuine job-offer bullet. - Could also host local Airflow and Astronomer Airflow if the laptop shouldn\u0027t run Docker 24/7. Rules (stricter than the rest — this is the home network) - Nothing about this box in the public repo : no IPs, no hostnames, no compose files with paths/ports. Keep its config in a PRIVATE repo or local-only (Secrets Hygiene). - Egress-only telemetry (collector pushes out); zero inbound ports opened for the lab. - Watch ingest volume: Plex + arr logs are chatty — New Relic\u0027s 100 GB and the 50 GB guard apply here too. Sample/filter at the collector. When Anytime — it\u0027s independent of the OCI cluster and can run as a parallel track from the laptop. How The laptop\u0027s Claude follows HOME-SERVER-MISSION.md (repo root) — 4 milestones: metrics to both backends → filtered logs → alerts (disk pressure, container down, transcode spike) → OneAgent-vs-OTel comparison. All host-specific files stay in ~/observability/ , outside this repo."},{"p":"vault/tech/k3s.md","t":"k3s","x":"k3s Single-binary Kubernetes; one server node on the OCI Always Free VM. Chosen over AKS because AKS nodes are paid VMs — k3s on free compute is the only €0 Kubernetes (Azure Free Account). Install (Phase 2, via cloud-init in terraform/modules/oci-cluster ) Minimums: 2 cores / 2 GB for the server (docs.k3s.io) — trivial on the A1 shape. Lab-specific notes - Agones on k3s is community-proven (Linode\u0027s Xonotic guide) but NOT officially supported — pin versions, expect to debug alone. - Traefik ships by default — fine for the site/chatbot ingress; game traffic bypasses it (hostPort UDP/WS via Agones). - Firewall, twice : game ports must be open in the OCI VCN security list AND in the instance\u0027s iptables — Oracle\u0027s Ubuntu images ship restrictive host rules that silently eat UDP. 1 failure mode. - Observability: OTel Collector runs as a deployment here; k8s events + kubelet metrics feed Dynatrace / New Relic k8s views."},{"p":"vault/tech/k6.md","t":"k6","x":"k6 Grafana\u0027s load-testing tool — the \"player swarm\" generator for 07 Demo Script step 2. Verified 2026-07-06 - OSS (AGPL-3.0), free; native arm64 binaries and Docker images — runs on the OCI Always Free cluster or the laptop. - Protocols: HTTP, WebSockets , gRPC, browser. No UDP in core (xk6-udp extensions exist but are tiny community projects — avoid). - Grafana Cloud free tier includes 500 k6 cloud VUh/month — stream local-run results there for pretty on-camera dashboards. Consequences for the lab - The agar.io-clone fleet (WebSocket — Game Servers) is k6-testable natively: ramping VUs that connect, move, disconnect = FleetAutoscaler trigger + latency SLO load. - Minecraft is NOT k6 territory (raw UDP/TCP game protocol) — use a Minecraft bot library; k6 can still probe its TCP status port for a liveness check. - Also load-test the Gemini Chatbot HTTP endpoint (gently — free-tier RPM limits, Free Tier Limits)."},{"p":"vault/tech/MongoDB Atlas.md","t":"MongoDB Atlas (stretch — game leaderboard + database observability)","x":"MongoDB Atlas (stretch — game leaderboard + database observability) The game needs one stateful thing to make persistence real: a leaderboard . Atlas M0 gives a managed MongoDB free, and monitoring a real database turns into its own observability exercise. Free tier — ⚠️ NOT yet verified by a live check (do it at signup) Community-known M0 terms: 512 MB storage, shared vCPU/RAM, 3-node replica set, deployable on AWS/Azure/GCP regions, free forever, no card. Verify on mongodb.com/pricing before relying on numbers — this note was written from secondary sources, unlike the rest of Free Tier Limits. The build (1 evening) 1. Atlas signup (gmail) → M0 cluster in a nearby EU region → database user + IP allowlist (the OCI VM\u0027s egress IP only — never 0.0.0.0/0). 2. Connection string → k8s secret via Terraform (Secrets Hygiene). 3. agar.io-clone: top-10 scores collection, write on player death, read on lobby join. Exercises 1. Instrument the Mongo driver calls with OpenTelemetry spans — now a game trace shows game → leaderboard.write → Atlas end-to-end; find the slowest query in Dynatrace. 2. Atlas\u0027s built-in metrics vs your OTel view: what does each see that the other can\u0027t? (One paragraph in the vendor-comparison doc.) 3. Chaos extra: block Atlas egress for 60 s (security-list rule) — does the game degrade gracefully? Does an SLO catch it? (Dynatrace SLOs)"},{"p":"vault/tech/New Relic.md","t":"New Relic","x":"New Relic The standing free backend (forever, no card) and the vendor-comparison counterpart to Dynatrace. Verified 2026-07-06 (Free Tier Limits) - 100 GB ingest/month + 1 Full Platform user + unlimited basic users. APM, logs, k8s, dashboards, synthetics, email alerts all included. - Overage = hard lockout of the whole platform until the 1st of next month (no bill — no card on file). A runaway debug-log loop locks you out mid-demo-prep. - Trace retention ~8 days → screenshot demo evidence immediately. Setup order (Phase 4 — deliberately after the guard rails exist) 1. OTLP exporter in the OTel Collector ( otlp.nr-data.net , license key via k8s secret). 2. newrelic-config module (Terraform): NRQL drop rules for chatty k8s namespaces + ingest alert at 50 GB — before any dashboard work. 3. Synthetics (✅ verified 2026-07-06): simple ping monitors don\u0027t consume any check quota — these ARE the lab\u0027s uptime probes (GitHub Pages site + game endpoints), down to 1-min cadence. ⚠️ Non-ping (browser/scripted) monitors get only 500 free checks/month — a single 5-min browser monitor burns ~8,900/mo. Ping only. 4. Parity dashboards mirroring the Dynatrace SLOs views → raw material for the comparison doc (05 Phase 4 — New Relic and Comparison)."},{"p":"vault/tech/OCI Always Free.md","t":"OCI Always Free","x":"OCI Always Free Role in the lab: the muscle — one Ampere A1 ARM VM (up to 4 OCPU / 24 GB / 200 GB boot volume, free forever) hosting k3s + Agones + Game Servers + Elastic Stack + OTel Collector. Chosen because it\u0027s the only €0 host with enough RAM (01 Phase 0 — Free Tiers and Architecture). Gotchas - Home region is permanent — choose before signup; quieter regions have better free-ARM availability. - \"Out of host capacity\" for free A1 instances is a known 2026 issue in busy regions: retry (script it), or upgrade the account to PAYG while staying inside always-free shapes — reportedly improves placement priority. Card required at signup either way (verification only). - Everything is ARM64 — every container image on the cluster must be linux/arm64 (see the verification section in Agones and Game Servers). - Terraform module: terraform/modules/oci-cluster — ports 22, 80/443, 7000-8000/udp, 6443 (home IP only). - Retry helper if capacity blocks: hitrov/oci-arm-host-capacity (script the instance-create loop). ⚠️ Verified 2026-07-06 — the free tier may have SHRUNK A June-2026 change (reported by users, silently edited docs, no official announcement ) cuts always-free A1 from 4 OCPU/24 GB to 2 OCPU/12 GB ; PAYG-upgraded accounts reportedly keep 4/24 plus priority capacity. Single-source + inconsistent Oracle support answers — check docs.oracle.com/iaas/Content/FreeTier at signup and correct this note. Design consequence: the lab\u0027s RAM budget assumes 12 GB (03 Phase 2 — Cluster and Agones); if signup shows 24 GB, everything gets roomier, not tighter. PAYG upgrade (card already on file, still €0 within free shapes) is the sanctioned fix for both capacity and the bigger shape."},{"p":"vault/tech/OpenTelemetry.md","t":"OpenTelemetry","x":"OpenTelemetry The vendor-neutral instrumentation layer — the reason four backends cost one integration effort. SDKs in the workloads emit OTLP → the OTel Collector fans out. What gets instrumented (Phase 3) Workload Signals The metrics that matter --- --- --- agar.io-clone server (Game Servers) traces, metrics, logs game.tick.duration , game.ws.rtt , game.players.active Gemini Chatbot traces (span per LLM call), metrics model, token counts, latency, error class — the AI-observability story k3s cluster k8s events, kubelet/host metrics pod restarts (the chaos signal), node saturation Dutch-lessons site (GitHub Pages) HTTP probes availability, TTFB (New Relic synthetic pings) Conventions (the \"standards\" job bullet — decide once, enforce in code review) - Resource attributes on everything: service.name , service.version , deployment.environment=lab . - Metric names: game. namespace, seconds/base units, low-cardinality labels (a runaway label blows Grafana Cloud\u0027s 10k-series cap first). - Node SDK for the game (auto-instrumentation + manual spans around the tick loop). Backends: Dynatrace · New Relic · Grafana Cloud · Elastic Stack — all take OTLP."},{"p":"vault/tech/OTel Collector.md","t":"OTel Collector","x":"OTel Collector The fan-out heart: one deployment on k3s, receiving everything, exporting everywhere. Kill this pod and ALL backends go dark — which is itself a good demo of pipeline observability (monitor the collector\u0027s own metrics). Pipeline sketch (Phase 3, contrib distribution — arm64 images exist) Rules - memory_limiter FIRST in every pipeline (~300 MB cap — the RAM budget in 03 Phase 2 — Cluster and Agones depends on it). - Backend tokens live in k8s secrets created by Terraform, never in the committed collector config (Secrets Hygiene). - One backend down must not block the others: per-exporter sending queues + retry on their own."},{"p":"vault/tech/Secrets Hygiene.md","t":"Secrets Hygiene","x":"Secrets Hygiene Hard-learned lesson (a token was once committed at work before scanning existed). This repo is PUBLIC — the rules are absolute, boring, and enforced by machines, not memory. The layers 1. pre-commit gitleaks ( .pre-commit-config.yaml ) — blocks the commit locally. pip install pre-commit \u0026\u0026 pre-commit install once per clone (Phase 1 step 2). 2. CI gitleaks ( .github/workflows/gitleaks.yml ) — full-history scan on every push, catches machines that skipped step 1. 3. .gitignore — .tfvars , keys, kubeconfigs, .env can\u0027t be staged by accident. 4. Where secrets actually live : GitHub Actions secrets (CI) · k8s secrets created by Terraform from variables passed at apply time (backends\u0027 tokens) · AI Studio/console dashboards (LLM keys) · laptop ~/.kube/config . If a secret leaks anyway Rotate FIRST (the provider console), then clean history ( git filter-repo ), then force-push. Rotation beats history-scrubbing every time — the internet already cached the push. Extra rule for the public repo: no home IPs, no home-network details in committed configs — applies especially to Home Server Docker Stack notes."},{"p":"vault/tech/Terraform.md","t":"Terraform","x":"Terraform The spine of the lab: clouds, cluster bootstrap, AND all observability config (Dynatrace, New Relic, Grafana Cloud) are code. Same discipline as work, personal scale. Layout (repo terraform/ ) - envs/lab/ — the single environment; modules enabled phase by phase in main.tf . - modules/oci-cluster · dynatrace-config · newrelic-config · grafana-cloud — each README says what belongs in it and its gotchas. State backend: HCP Terraform (no bootstrap chicken-and-egg) Create org + workspace lab in the HCP UI (Phase 1 step B), set Local execution mode, uncomment the cloud {} block in envs/lab/backend.tf , terraform init — done. No storage infra to pre-create (this replaced the Azure blob design, 2026-07-06). Rules - Providers pinned in providers.tf ; bump deliberately. - No secrets in .tf or state-committed values echoed — tokens via env vars / CI secrets (Secrets Hygiene). - LRS not GRS, versioning off (the €0 rule); terraform fmt enforced pre-commit and in GitHub Actions. - The October drill : dynatrace-config must fully rebuild a fresh tenant. Practice once before 2026-10."}];
const GH = "https://github.com/SScleves/personal-lab/blob/main/";
const q = document.getElementById("q"), out = document.getElementById("results"),
      count = document.getElementById("count");
function esc(s){ return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function search(term){
  const words = term.toLowerCase().split(/\s+/).filter(w => w.length > 1);
  if (!words.length){ out.innerHTML=""; count.textContent = DOCS.length + " documents indexed"; return; }
  const scored = [];
  for (const d of DOCS){
    const t = d.t.toLowerCase(), x = d.x.toLowerCase();
    let score = 0, allFound = true;
    for (const w of words){
      const inT = t.includes(w), nX = x.split(w).length - 1;
      if (!inT && nX === 0){ allFound = false; break; }
      score += (inT ? 30 : 0) + Math.min(nX, 10) * 3;
    }
    if (allFound) scored.push([score, d]);
  }
  scored.sort((a,b) => b[0]-a[0]);
  count.textContent = scored.length + " result" + (scored.length===1?"":"s");
  out.innerHTML = scored.slice(0, 40).map(([s, d]) => {
    const x = d.x, lx = x.toLowerCase();
    let i = lx.indexOf(words[0]); if (i < 0) i = 0;
    const a = Math.max(0, i - 80);
    let snip = esc(x.slice(a, a + 240));
    for (const w of words)
      snip = snip.replace(new RegExp("("+w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"), "<b>$1</b>");
    return '<div class="hit"><a href="' + GH + encodeURI(d.p) + '" target="_blank">' + esc(d.t) +
           '</a><div class="path">' + esc(d.p) + '</div><div class="snip">…' + snip + '…</div></div>';
  }).join("");
}
q.addEventListener("input", () => search(q.value));
search("");
</script>
