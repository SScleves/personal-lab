const DOCS = [{"p":"ALIENWARE-MISSION.md","t":"ALIENWARE-MISSION.md — for the Claude running on the Alienware (games) laptop","x":"ALIENWARE-MISSION.md — for the Claude running on the Alienware (games) laptop You are Claude on Santi\u0027s Windows gaming laptop — the machine where his two self-made video games live. That\u0027s this machine\u0027s identity: games and play. (The Dutch-lessons site does NOT live here — it was published from the main machine and is already live at https://sscleves.github.io/dutch-lessons/.) Read CLAUDE.md in this repo first; its hard rules apply. Two missions. Extra rules for THIS machine 1. The games are Santi\u0027s personal creations. Read, inventory, assess — but never refactor, \"improve\", or reorganize them without his explicit go. 2. Santi creates repos and pushes, as always. You prepare everything push-ready. 3. Kubeconfig for the lab cluster lives on one machine only — ask Santi whether this is it before ever copying credentials here. Session protocol 1. git pull this repo → read CLAUDE.md , then HANDOFF-STATE.md (anything newer wins), then this file. vault/08 Month Plan.md shows where the lab currently stands. 2. Work the missions in order; one per session is fine. 3. End of session: update HANDOFF-STATE.md (generic progress only), rebuild search.html if docs changed, remind Santi to commit+push. Mission A — assess the two games as future lab workloads (report, don\u0027t port) Find the games first (ask Santi where they live on this machine). For EACH, produce a short written assessment (add it to the vault as vault/tech/Game Assessment - \u003cname .md , generic enough for the public repo — no local paths): - Engine/language, and does it have (or could it have) a server component ? - Can that server run headless (no GPU/window) on Linux? On ARM64 ? (The cluster is ARM — vault/tech/Docker.md explains why this gates everything.) - What could it emit as telemetry: tick duration, player/entity count, frame budget, load time? - mes 12 GB ; verify at signup. Capacity scarcity persists — quiet home region, retries, or PAYG upgrade (still €0 within free shapes). - Agones on arm64 is Alpha-tier (amd64 is Stable): pin v1.59.0, smoke-test with the simple-game-server example (guaranteed arm64), upgrade deliberately. k3s is community-proven but unofficial. - Game choice locked by verification : agar.io-clone (Node/WebSocket) = MVP fleet — arm64-native and k6 can swarm it natively; Minecraft Java (itzg multi-arch) = recognizable demo extra; Bedrock (x86-only) and the Xonotic/STK example images (arm64 unverified) are out. - k6 has no UDP: WebSocket game = native k6; Minecraft load = bot library, k6 probes its TCP status port. - UDP 7000-8000 must be opened in BOTH the OCI security list and host iptables (Oracle images ship restrictive rules) — the 1 reported Agones-on-cloud failure. - Dynatrace re-trial eligibility after October is community lore, not published policy. - Optional extension: the home Docker media stack (Plex/ arr) as a second observed environment — egress-only telemetry, nothing about the home network in this public repo."},{"p":"CLAUDE.md","t":"CLAUDE.md — read this first, every session, on every machine","x":"CLAUDE.md — read this first, every session, on every machine Companion file: GUARDRAILS.md — 15 hard rules. Read it second, follow it absolutely. This is Santi\u0027s personal observability lab : Terraform + k3s + Agones game servers on OCI free tier, observed by Dynatrace/New Relic/Grafana/ELK via OpenTelemetry, for €0, to make every bullet of an Observability-Specialist job offer demonstrable. You (Claude) assist; Santi operates. Session start protocol (in order, before doing anything) 0. Which machine are you on? Role dispatch — read your brief after this file: - Linux home server (Docker media stack on the host) → HOME-SERVER-MISSION.md - Alienware / Windows gaming laptop (games ONLY — Santi\u0027s two self-made games) → ALIENWARE-MISSION.md - Work machine or anything else eds until the previous one\u0027s verify command passed. If a runbook step fails twice, STOP — diagnose, don\u0027t improvise forward. 7. Plan before apply, always. terraform plan output gets READ (adds/changes/destroys counted and explained to Santi) before any apply . A destroy count 0 needs Santi\u0027s explicit OK, every time. 8. The Dynatrace tenant is mortal (free until 2026-10). Any config not in terraform/modules/dynatrace-config will die with it. UI-only configuration is forbidden except for reading/exploring. 9. Ingest caps are protective walls : New Relic hard-locks at 100 GB/month. The 50 GB guard alert + drop rules are built BEFORE any dashboard work. When in doubt, send less. 10. ARM64 everywhere on the cluster. Every image gets --platform linux/arm64 or a verified multi-arch manifest before deploy. exec format error = you skipped this. 11. Never rename werkplek\u0027s internal identifiers ( flowdeck DB name, storage keys, backup app field) — renaming orphans Santi\u0027s data. Display strings only. 12. Don\u0027t rewrite Santi\u0027s creative content (the book, the games, Dutch lesson content, his About text) — additive help only, and only when asked. 13. Don\u0027t re-litigate decided decisions (list in CLAUDE.md ). Zero-Azure infra, OCI compute, public repos, agar.io+Minecraft-Java, ping-only synthetics — decided. Reopen only if Santi does. 14. Update HANDOFF-STATE.md before ending any session , and rebuild search.html (Windows machines only) when docs changed. The repo IS the memory. 15. When a fact and this repo disagree, verify live and fix the repo — never silently proceed on either version. (This is how the Alienware/Dutch mix-up got fixed.)"},{"p":"HANDOFF-STATE.md","t":"HANDOFF-STATE — read me first when resuming","x":"HANDOFF-STATE — read me first when resuming Last update: 2026-07-07 (end of the Phase-0/1 session). Any Claude on any machine: read CLAUDE.md first — session protocol and hard rules — then this file top to bottom. EXACT resume for the Claude running on the Linux home server","x":"HOME-SERVER-MISSION.md — for the Claude running on the Linux home server You are Claude, running on Santi\u0027s Linux laptop/home server that hosts a Docker media stack (Plex, Jellyseerr, Radarr, Sonarr, Prowlarr, qBittorrent — verify, don\u0027t assume). Your mission: make this stack observable in Dynatrace and New Relic via OpenTelemetry , so Santi learns container observability on real workloads. Read CLAUDE.md in this repo first — its hard rules apply here, plus the stricter ones below. Non-negotiable rules for THIS machine 1. This repo is PUBLIC. Nothing host-specific ever gets committed : no IPs, hostnames, MACs, compose files, volume paths, media library names. All work happens OUTSIDE the repo clone in ~/observability/ (local only, never a git remote unless Santi makes a private repo). 2. Egress-only. The collector pushes out. Open no inbound ports, change no router config. 3. Do not touch the media containers themselves (no restarts, no compose edits) without asking Santi first — this stack is in daily use. Adding NEW containers alongside is fine. 4. Secrets (API tokens) live in ~/observability/.env , chmod 600, never echoed, never committed. 5. Ingest caps are real : New Relic free = 100 GB/month with full-platform lockout on breach. Start metrics-only; add logs with filters later. When in doubt, send less. Session protocol 1. git pull this repo; read HANDOFF-STATE.md for anything newer than this file. 2. Inventory (read-only): docker ps --format \u0027table {{.Names}}\\t{{.Image}}\\t{{.Status}}\u0027 , docker system df , df -h , free -h , and locate (but do not edit) the compose file. Show Santi the inventory; confirm scope before building. 3. Execute the milestones below in order. One milestone per session is fine. 4. At the end: update HANDOFF-STATE.md with GENERIC progress only (\"M1 done, both backends receiving\") — no host details — and remind Santi to commit+push. Linux notes: - Do NOT try to rebuild search.html — the build script is PowerShell/Windows-only; the next Windows session will refresh it. - Before the FIRST commit from this box, set the repo-local identity ( git config user.name \"SScleves\" / git config user.email \"santiagosanch@gmail.com\" ) and verify with git log --format=\u0027%an %ae\u0027 -1 after committing — the work-email trap has bitten once already. Credentials you must ask Santi for (never mint or guess) - Dynatrace : tenant = https://fjl36225.sprint.apps.dynatracelabs.com (free until 2026-10). Ask for an API token with scopes: metrics.ingest , logs.ingest , openTelemetryTrace.ingest . Get the exact OTLP endpoint from the tenant UI (search \"OpenTelemetry\" in the tenant; sprint environments use a …sprint.dynatracelabs.com/api/v2/otlp form — verify in the UI, do not guess the URL ). - New Relic : if no account exists yet (check vault/09 Signup Checklist.md ), walk Santi through https://newrelic.com/signup (free, no card) — choose the EU data center . Then ask for the license key (ingest type). EU OTLP endpoint: https://otlp.eu01.nr-data.net:4318 (US accounts use otlp.nr-data.net — match the account region, this is the 1 silent failure). Milestone 1 — container + host metrics into BOTH backends (one evening) In ~/observability/ , create three files. docker-compose.yml : .env (chmod 600): config.yaml (collector): Start: docker compose up -d (older Docker: docker-compose up -d — check which exists with docker compose version docker-compose version ) → docker logs otelcol must show no export errors after 2 minutes. Verify in both UIs (Dynatrace: Metrics browser, search container. ; New Relic: Metrics explorer, filter deployment.environment = home-server ). 📸 both. Milestone done = the same per-container CPU/memory visible in two vendors. Milestone 2 — logs, with the safety filters ON from minute one Add a filelog receiver on /var/lib/docker/containers/ / -json.log (mount it :ro, add the json_parser operator), a filter processor dropping severity \u003c WARN for the chatty arr containers, and a logs pipeline to both exporters. Before enabling: estimate volume with docker logs --since 24h \u003cnoisiest wc -c × containers × 30 — if the projection exceeds ~1.5 GB/day, filter harder. After 48 h, check actual ingest in both UIs and record the number in the vendor-comparison notes. Milestone 3 — the alerts that make it observability (not just dashboards) 1. Disk pressure (the realistic failure: qBittorrent fills the disk): alert at 85% filesystem used — build it in BOTH vendors, compare the experience. Dynatrace side goes in terraform/modules/dynatrace-config (it\u0027s tenant config — as code, always). 2. Container down : docker stop a low-stakes container (ask Santi which) → both vendors must show it → restart it. Time-to-detect goes in the comparison notes. 3. Transcode spike : play something that forces a Plex transcode → find the CPU spike in both. Milestone 4 (stretch) — OneAgent vs OTel Deploy the Dynatrace OneAgent container alongside (tenant UI → Deploy → Docker). Compare against the OTel view: what does OneAgent see that OTel doesn\u0027t (process-level, auto-topology), what does it cost in resources, which would you deploy at a client? One page of notes → interview gold. Remove it after if the laptop feels it. Troubleshooting order docker logs otelcol → add a debug exporter temporarily → check the endpoint region (EU vs US is the classic) → check token scopes → curl -v the OTLP endpoint from the host. Never debug by pasting tokens into chat or commits."},{"p":"README.md","t":"personal-lab — observability lab, everything-as-code","x":"personal-lab — observability lab, everything-as-code One repo = the whole project: architecture, step-by-step guides (an Obsidian vault), Terraform, and CI. Personal accounts only (github.com, gmail, Azure free, OCI free). Nothing here touches work systems. How to read this from any machine 1. Santi pushes this repo to github.com/SScleves/personal-lab (public). 2. On the laptop: git clone https://github.com/SScleves/personal-lab.git 3. Open the vault/ folder in Obsidian ( Open folder as vault ) → the full guide with the graph view. Map Path What --- --- CLAUDE.md AI assistants start here — session protocol, hard rules, decisions already made ARCHITECTURE.md The design: components, data flows, free-tier limits, what dies when, €0 proof vault/ Obsidian guide — phases, per-technology notes, demo script. Start at 00 Home terraform/ All infrastructure as code. envs/lab is the only environment .github/workflows/ CI: gitleaks on every push, terraform plan on PR, apply on main HANDOFF-STATE.md Where work stopped last session — read this first when resuming search.html Offline full-text search over all docs (double-click from any clone). Rebuild: powershell _build\\build-search.ps1 The one-line pitch Terraform provisions a k3s cluster (OCI free ARM) running Agones game-server fleets; a chaos job kills game servers mid-session; OpenTelemetry fans the same telemetry out to Dynatrace (SLOs + Workflows), New Relic , Grafana Cloud , and self-hosted Elasticsearch ; k6 swarms simulate players; a nightly Airflow DAG lands telemetry in Databricks ; a Gemini-backed chatbot on the Dutch-lessons site provides the AI-observability story. Total cost: €0. Rules (from day one) - Secrets never enter this repo: gitleaks runs pre-commit and in CI. .tfvars , tokens, kubeconfigs are gitignored. - Only Santi creates accounts and pushes commits. - Every phase ends with something visibly monitored."},{"p":"terraform/modules/dynatrace-config/README.md","t":"module dynatrace-config (Phase 3)","x":"module dynatrace-config (Phase 3) Everything the tenant knows lives here, because the tenant is mortal (free until 2026-10): SLOs (game tick rate, connect latency, chatbot p95), Workflows (problem → notify + annotate + Agones allocation call), alerting profiles, management-zone/tag rules, OTLP ingest tokens (as sensitive outputs, never state-committed values echoed). Provider: dynatrace-oss/dynatrace. Auth via env vars DYNATRACE_ENV_URL / DYNATRACE_API_TOKEN. Prefer \"simple\" workflows where possible — on paid DPS a standing standard workflow ≈ $22/mo. Tenant re-apply drill: new tenant → new token → terraform apply → done in ~10 min. Practice it once."},{"p":"terraform/modules/github-estate/README.md","t":"module github-estate — the SScleves repos as code","x":"module github-estate — the SScleves repos as code Manages the GitHub estate ITSELF via the GitHub provider: repo settings, Pages configuration (so \"enable Pages\" is never a forgotten click again), descriptions/topics, branch protection on personal-lab. Content (book text, HTML, notes) stays plain git — this module manages settings. Import-first, exactly like work : the repos already exist, so they are imported (see the import blocks in estate.tf), then terraform plan is iterated to zero changes before anything is ever modified. Never let TF create-or-destroy a repo it didn\u0027t import. Auth: fine-grained PAT (Repository permissions: Administration RW, Pages RW, Contents R) → env var GITHUB_TOKEN locally / Actions secret. Provider block: owner = \"SScleves\" . Wire-up: uncomment the module in envs/lab/main.tf (a Phase-5-class exercise — see vault/tech/GitHub Estate Guide.md section 6)."},{"p":"terraform/modules/grafana-cloud/README.md","t":"module grafana-cloud (Phase 4)","x":"module grafana-cloud (Phase 4) Free forever: 10k metric series / 50 GB logs / 50 GB traces / 14-day retention / native OTLP. Module manages: OTLP endpoint token, folder + comparison dashboards, one IRM alert route. Watch the 10k active-series cap — it\u0027s the limit a mislabeled exporter blows first. Bonus: 500 k6 cloud VUh/month are included — send k6 results here."},{"p":"terraform/modules/newrelic-config/README.md","t":"module newrelic-config (Phase 4)","x":"module newrelic-config (Phase 4) Free tier is forever but hard-stops at 100 GB/month (full platform lockout until month rollover). This module therefore ships, in order of importance: 1. NRQL drop rules for chatty k8s namespaces/debug logs. 2. Ingest alert at 50 GB (email — the free notification channel). 3. Parity dashboards mirroring the Dynatrace SLO views for the vendor comparison doc."},{"p":"terraform/modules/oci-cluster/README.md","t":"module oci-cluster (Phase 2)","x":"module oci-cluster (Phase 2) Always-free Ampere A1 (4 OCPU / 24 GB / VM.Standard.A1.Flex) + VCN + security list opening: 22/tcp (admin), 80/443 (site/probes), 7000-8000/udp (Agones gameserver port range), 6443 (k3s API, restrict to home IP). cloud-init installs k3s (single node, server+agent) and labels the node for Agones. STAY inside always-free: one A1.Flex ≤ 4 OCPU/24 GB total, boot volume ≤ 200 GB, no paid add-ons. Known issue: \"Out of host capacity\" for free A1 in busy regions — pick a quieter home region or retry; region choice is permanent per tenancy, choose before signup."},{"p":"vault/00 Home.md","t":"🏠 Personal Observability Lab","x":"🏠 Personal Observability Lab One repo, €0, every job-offer bullet demonstrable. The design lives in ARCHITECTURE.md (repo root); this vault is the how . Open the graph view — every note links to what it touches. Start here - 08 Month Plan — the week-by-week schedule with exercises per technology ⭐ - 09 Signup Checklist — every account, its status, and when it\u0027s needed - Runbooks (micro-steps, do→verify, for execution) : R1 Week 1 — OCI account, server, k3s · R2 Week 2 — Docker, Agones, chaos · R3 Week 3 — OTel fan-out, Dynatrace SLOs, Workflow · R4 Week 4 — New Relic, Grafana, the comparison · R5 Stretch — Databricks, Airflow, Gemini, AI Foundry - Hard rules: GUARDRAILS.md (repo root) + the execution protocol in CLAUDE.md Phases (the detailed guides, in order) 1. 01 Phase 0 — Free Tiers and Architecture — ✅ done 2026-07-06 2. 02 Phase 1 — Accounts, Repo, State — ⬅️ you are here (repo ✅, HCP 🟡, OCI ⬜) 3. 03 Phase 2 — Cluster and Agones 4. 04 Phase 3 — OTel and Dynatrace 5. 05 Phase 4 — New Relic and Comparison 6. 06 Phase 5 — Databricks, Airflow, AI 7. 07 Demo Script — the on-camera flow everything builds toward The stack, by layer - Code \u0026 CI : Terraform · GitHub Actions · HCP Terraform (state) · Secrets Hygiene - Running your stuff : GitHub Estate Guide ⭐ — repos, Pages, the book workflow, notes app, troubleshooting - Cloud \u0026 hosting : OCI Always Free · GitHub Pages · (Azure Free Account — dropped) — limits: Free Tier Limits - Platform : k3s · Agones · Docker · Game Servers - Data (stretch) : MongoDB Atlas (leaderboard + DB observability) - Telemetry : OpenTelemetry · OTel Collector (the fan-out heart) - Backends : Dynatrace (Dynatrace SLOs · Dynatrace Workflows) · New Relic · Grafana Cloud · Elastic Stack - Load \u0026 chaos : k6 · chaos CronJob (in 03 Phase 2 — Cluster and Agones) - Analytics \u0026 AI : Databricks · Airflow and Astronomer · Gemini Chatbot - Optional second environment : Home Server Docker Stack (Plex/ arr — real workloads, strict privacy rules) - Personal frontends : Frontend RUM — werkplek, The Truth + the book, Dutch site Standing rules Personal accounts only · Santi pushes all commits · every phase ends with something visibly monitored · secrets never enter the repo (Secrets Hygiene) · when a session ends mid-work, update HANDOFF-STATE.md in the repo root."},{"p":"vault/01 Phase 0 — Free Tiers and Architecture.md","t":"Phase 0 — Free tiers \u0026 architecture ✅ (2026-07-06)","x":"Phase 0 — Free tiers \u0026 architecture ✅ (2026-07-06) Every free tier was verified against live vendor pages — numbers and sources in Free Tier Limits. The architecture (components, data flow, what-dies-when, €0 proof) is ARCHITECTURE.md in the repo root. The three findings that shaped the design 1. Dynatrace has no free tier — but Santi\u0027s tenant is free until 2026-10 , so the lab has a 3-month runway. Insurance: every tenant config is Terraform code, so a fresh trial tenant is a ~10-minute re-apply. 2. Azure Free Account VMs are ~1 GiB RAM — too small for k3s + Agones + Elastic Stack. Hence OCI Always Free hosts the cluster. (Post-script: Azure was then dropped entirely on 2026-07-06 — signup loop; HCP Terraform + GitHub Pages + New Relic synthetics took its jobs.) 3. Trial-then-fallback is the pattern for anything without a free tier: Airflow and Astronomer (14 days → local Astro CLI), Elastic Cloud (14 days → self-hosted Basic on the cluster). Decisions locked Public GitHub repo · OCI for compute · Logstash demo-only (Elastic Stack) · Gemini Chatbot on Gemini free tier with Groq fallback · alerts that actually fire live in Dynatrace, New Relic (email) and Grafana Cloud IRM — not Kibana (free connectors can\u0027t notify)."},{"p":"vault/02 Phase 1 — Accounts, Repo, State.md","t":"Phase 1 — Accounts, repo, state (effort: LOW — signups and boilerplate)","x":"Phase 1 — Accounts, repo, state (effort: LOW — signups and boilerplate) Goal: repo live on GitHub ✅, OCI account exists, Terraform remote state works (HCP Terraform). Azure was dropped 2026-07-06 — signup impossible (gmail/GitHub Microsoft-identity loop); replacements: HCP Terraform (state), GitHub Pages (site), New Relic synthetics (probes). Steps A. Repo — ✅ DONE 2026-07-06 Pushed to https://github.com/SScleves/personal-lab (public), gitleaks green, branch protection on, commit identity = personal (repo-local config). Laptop clone + Obsidian vault = step 7 if not done. Still pending on the work machine: winget install Python.Python.3.12 → pip install pre-commit → pre-commit install (Secrets Hygiene local guard). B. HCP Terraform (state backend) — HCP Terraform 1. https://app.terraform.io/public/signup/account → sign up with gmail (no card). 2. Create organization (e.g. sscleves-lab ) → create workspace lab (CLI-driven workflow). 3. Workspace → Settings → Execution Mode → Local (HCP holds state+locks; CI runs terraform). 4. User Settings → Tokens → create API token → GitHub secret TF_API_TOKEN (https://github.com/SScleves/personal-lab/settings/secrets/actions); locally: terraform login . 5. Uncomment the cloud {} block in terraform/envs/lab/backend.tf , set the org name, terraform init — remote state live. 📸 C. OCI (compute account) — OCI Always Free 6. Pick home region BEFORE signup (permanent; from NL: eu-marseille-1/eu-paris-1 quieter than eu-amsterdam-1). https://www.oracle.com/cloud/free/ — card for verification only. 7. Note which A1 free shape you get (4 OCPU/24 GB or 2/12) — it decides the Phase 2 layout. D. Site to GitHub Pages — GitHub Pages 8. Copy the Dutch-lessons site into a site/ folder (or its own repo) → Settings → Pages → deploy from branch (or the Pages action). URL live = the probe target for Phase 4 synthetics. Ends visibly monitored: gitleaks green ✅ + terraform plan/apply green against HCP state. Next: 03 Phase 2 — Cluster and Agones"},{"p":"vault/03 Phase 2 — Cluster and Agones.md","t":"Phase 2 — Cluster, game fleet, chaos (effort: MEDIUM/HIGH)","x":"Phase 2 — Cluster, game fleet, chaos (effort: MEDIUM/HIGH) Goal: k3s on the OCI Always Free VM, Agones managing a Game Servers fleet, a chaos CronJob killing gameservers on schedule. Ends visibly monitored: kubectl get gameservers shows kills and respawns happening on their own. Steps 1. Fill terraform/modules/oci-cluster : A1.Flex VM (4 OCPU/24 GB), VCN, security list — 22/tcp, 80/443/tcp, 7000-8000/udp (Agones port range), 6443/tcp restricted to home IP. 2. cloud-init: install k3s single-node ( curl -sfL https://get.k3s.io sh - ), copy kubeconfig → laptop ( ~/.kube/config , NEVER the repo — Secrets Hygiene). 3. PR → plan → merge → apply → kubectl get nodes from the laptop. 📸 4. Install Agones via Helm, version PINNED (arm64 is Alpha — see the ✅ verification section there). 5. Smoke test with the official simple-game-server Fleet (the one example guaranteed arm64) — kill a pod by hand, watch it respawn. Delete it. 6. Deploy the real fleet: agar.io-clone Fleet (2-3 replicas) + FleetAutoscaler — manifests and the Minecraft-Java option per Game Servers. 7. Join the game from the laptop — prove a human can play. 📸 8. Chaos CronJob ( /10 ): kill one allocated gameserver pod → watch Agones replace it. This loop is what Dynatrace SLOs will measure in Phase 3. 9. Also install the Elastic Stack (single-node ES + Kibana) now — it needs cluster RAM budgeted before anything else lands (~3 GB reserved). RAM budget (assume 12 GB — the possibly-shrunk free shape, OCI Always Free) k3s+system ~1.5 · Agones ~0.75 · agar.io fleet 3×0.3 · ES 2 (limit) + Kibana 1 · OTel Collector 0.3 (memory_limiter) ≈ 6.5 GB → ~5 GB headroom for k6 jobs and Phase 3. Minecraft Java (+2 GB) fits only as demo-day extra on 12 GB — or permanently if signup grants 24 GB. Next: 04 Phase 3 — OTel and Dynatrace"},{"p":"vault/04 Phase 3 — OTel and Dynatrace.md","t":"Phase 3 — Telemetry + Dynatrace SLOs/Workflows (effort: HIGH — the learning heart)","x":"Phase 3 — Telemetry + Dynatrace SLOs/Workflows (effort: HIGH — the learning heart) Goal: one instrumentation, four backends. Dynatrace SLOs burn when the chaos job kills a gameserver; a Dynatrace Workflows fires. Ends visibly monitored: a real alert lands during a real kill. Steps 1. Deploy the OTel Collector as the gateway: receivers (OTLP, k8s events, hostmetrics, filelog for game logs) → processors (k8sattributes, batch, memory_limiter) → exporters: Dynatrace OTLP, New Relic OTLP, Grafana Cloud OTLP, Elasticsearch. 2. Instrument the game wrapper + Dutch-site chatbot with OpenTelemetry SDKs; emit the two golden game metrics: tick duration and connect latency (see Game Servers). 3. terraform/modules/dynatrace-config : ingest token, SLOs (tick ≥ target, p95 connect \u003c target, chatbot p95), alerting profile, the Workflow (problem → notify + annotate + Agones allocation call). All code — the October tenant swap must be a re-apply, nothing manual (Dynatrace). 4. Trigger: let the chaos CronJob kill during a k6 swarm → SLO burns → problem → Workflow fires. 📸📸 5. Baseline dashboards in Kibana off the same data (Elastic Stack) for the pipeline-ownership story. Next: 05 Phase 4 — New Relic and Comparison"},{"p":"vault/05 Phase 4 — New Relic and Comparison.md","t":"Phase 4 — New Relic parallel + vendor comparison (setup LOW, comparison doc HIGH)","x":"Phase 4 — New Relic parallel + vendor comparison (setup LOW, comparison doc HIGH) Goal: same incident visible in Dynatrace, New Relic, Grafana Cloud and Kibana — then write the comparison doc (interview gold). Ends visibly monitored: New Relic emails an alert for the same kill Dynatrace caught. Steps 1. New Relic signup (free forever, no card) → OTLP license key → add exporter to the OTel Collector. Done — that\u0027s the whole \"setup\" (the fan-out design pays off here). 2. terraform/modules/newrelic-config FIRST JOB: drop rules + ingest alert at 50 GB — free tier hard-locks the whole UI if 100 GB is crossed (Free Tier Limits). 3. Parity dashboards: rebuild the two SLO views in New Relic and Grafana Cloud. 4. Run 07 Demo Script once; screenshot the same problem in all four backends (New Relic keeps traces only ~8 days — screenshot immediately). 5. The comparison doc: detection speed, problem-correlation quality, query language ergonomics (DQL vs NRQL vs LogQL/PromQL vs KQL), SLO modeling, alert routing, pricing model. One page per theme."},{"p":"vault/06 Phase 5 — Databricks, Airflow, AI.md","t":"Phase 5 — Databricks, Airflow, AI extras (effort: MEDIUM)","x":"Phase 5 — Databricks, Airflow, AI extras (effort: MEDIUM) Goal: the three job-offer differentiators. Ends visibly monitored: a Databricks dashboard over real lab telemetry, refreshed nightly by an Airflow DAG, and every chatbot LLM call traced. Steps 1. Databricks Free Edition signup (personal email, permanent) → create a Unity Catalog volume. 2. Export job: telemetry → Parquet (start dumb: a k8s CronJob on the cluster writing daily Parquet from the OTel Collector\u0027s file exporter, uploaded via Databricks SDK). 3. Airflow and Astronomer : start the 14-day Astro trial → build the DAG properly there (the export from step 2 becomes the DAG) → before day 14 export config → continue on local Astro CLI. 4. Databricks SQL: player-count vs latency vs SLO-burn analysis; one dashboard. 📸 5. Gemini Chatbot on the Dutch-lessons site: wrap every LLM call in OpenTelemetry spans (model, tokens, latency, error) → the \"AI observability\" interview story with real traces to show."},{"p":"vault/07 Demo Script.md","t":"🎬 Demo Script — the on-camera flow","x":"🎬 Demo Script — the on-camera flow The five minutes everything in this lab exists for. Rehearse until boring. 1. Cold open : terraform plan shows 0 changes — \"the entire estate, including every Dynatrace SLOs and Dynatrace Workflows, is this repo.\" 2. Load : launch the k6 player swarm → Agones FleetAutoscaler scales the fleet up ( kubectl get fleet -w on screen). 3. Chaos : kill an allocated gameserver pod mid-session (the chaos CronJob\u0027s command, run manually). 4. Detection : Dynatrace problem opens, SLO burn visible → Workflow fires: notification arrives, annotation lands, Agones allocation API called. Meanwhile Agones has replaced the pod — players reconnect. 5. Recovery : SLO recovers on screen. Flip to New Relic / Grafana Cloud / Kibana (Elastic Stack): same incident, four backends, one instrumentation (OTel Collector). 6. Close : the Databricks dashboard — \"and every night this telemetry becomes business insight.\" Props to prepare: split terminal (k9s + watch), four browser tabs pre-logged-in, phone showing the alert email. Failure modes rehearsed: k6 from laptop if cluster job fails; recorded backup run."},{"p":"vault/08 Month Plan.md","t":"🗓️ The Month Plan — 4 weeks + stretch, every tech with exercises","x":"🗓️ The Month Plan — 4 weeks + stretch, every tech with exercises Each week ends with something visibly monitored (the standing rule). Effort dial per week noted. This is the schedule + exercises; execution happens via the micro-step runbooks — R1 Week 1 — OCI account, server, k3s · R2 Week 2 — Docker, Agones, chaos · R3 Week 3 — OTel fan-out, Dynatrace SLOs, Workflow · R4 Week 4 — New Relic, Grafana, the comparison · R5 Stretch — Databricks, Airflow, Gemini, AI Foundry — under the rules in GUARDRAILS.md . Signups: 09 Signup Checklist. Week 1 — Foundations: accounts, state, THE SERVER (effort: low, one design evening) Goal: terraform apply creates the OCI VM; k3s answers kubectl get nodes from the laptop. 1. Finish HCP Terraform (org sscleves-lab , workspace lab , Local mode, token → TF_API_TOKEN ) → uncomment cloud {} in backend.tf → terraform init ✅ green. 2. OCI signup (OCI Always Free — quiet region, note the A1 shape granted!). 3. Write + apply terraform/modules/oci-cluster : VCN, security list (22/tcp home-IP, 80/443/tcp, 7000-8000/udp, 6443/tcp home-IP), A1 VM, cloud-init installs k3s. 4. Server bring-up drill: SSH in → sudo systemctl status k3s → copy kubeconfig to laptop (NEVER the repo) → kubectl get nodes → 📸. 5. Dutch-lessons site → GitHub Pages (Phase 1 step D) — first workload live. Exercises — Terraform: terraform state list/show , then the confidence drill: terraform destroy the VM and re-apply it (cattle, not pets — same drill the October Dynatrace swap needs). k3s: deploy nginx, expose it, curl it from home, delete it. Week 2 — Kubernetes for real: Docker, Agones, chaos (effort: medium/high — the build week) Goal: the agar.io fleet self-heals on camera; chaos runs on a schedule. (03 Phase 2 — Cluster and Agones) 1. Docker exercises FIRST (they gate everything): build the agar.io-clone image arm64 via buildx, push to GHCR, run it on the cluster as a plain pod. 2. Install Agones (Helm, pinned) → simple-game-server smoke test → real Fleet + FleetAutoscaler (Game Servers). 3. Chaos CronJob live. Play the game from two browsers while it kills a pod. 📸 4. Elastic Stack onto the cluster (ES + Kibana, RAM-budgeted). Exercises — Agones: scale Fleet 2→5→2 by editing the manifest via PR (pipeline does it); kubectl delete pod an ALLOCATED gameserver vs a READY one — observe the difference. k3s: drain/uncordon the node; find where k3s logs live. Docker: shrink the game image (multi-stage, alpine) — measure before/after. Week 3 — Telemetry + Dynatrace: the learning heart (effort: HIGH, don\u0027t rush it) Goal: kill a gameserver → Dynatrace problem → Workflow fires → SLO burn visible. (04 Phase 3 — OTel and Dynatrace) 1. OTel Collector gateway with fan-out (Dynatrace + Grafana Cloud first; New Relic joins W4). 2. Instrument the game (OpenTelemetry): tick duration, WS RTT, player count. 3. dynatrace-config module: SLOs + alerting profile + the Workflow (Dynatrace SLOs, Dynatrace Workflows). 4. The full loop on camera, alert on the phone. 📸📸 Exercises — Dynatrace: write 5 DQL queries (worst tick p99 per pod; players vs latency correlation…); break the SLO on purpose with k6, watch the burn rate; the October drill : delete one SLO in the UI, re-apply from Terraform, confirm drift-free plan. Elastic Stack: same incident found via Kibana query; one Lens dashboard. OTel Collector: add the debug exporter, watch a span leave the game and arrive in two backends. Week 4 — The comparison + load: New Relic, k6, the demo (setup low, comparison-doc high) Goal: same incident in 4 backends; 07 Demo Script rehearsed start-to-finish. (05 Phase 4 — New Relic and Comparison) 1. New Relic signup + OTLP exporter + 50 GB guard first + synthetics pings on the site. 2. k6 player swarm (WS script, ramping VUs) → FleetAutoscaler scales on camera; results → Grafana. 3. Parity dashboards; write the vendor-comparison doc (DQL vs NRQL vs PromQL/LogQL vs KQL). 4. Full demo rehearsal. Record a backup run. Exercises — New Relic: rebuild 3 of your DQL queries in NRQL; force a drop rule and prove data stops. k6: find the fleet\u0027s breaking point — the VU count where tick p95 crosses the SLO; that number goes in the comparison doc. Grafana Cloud: annotate the chaos kill from the Dynatrace Workflow webhook. Stretch week(s) — analytics, AI, and the extras (06 Phase 5 — Databricks, Airflow, AI) - Databricks: telemetry Parquet → volume → Delta → SQL dashboard (exercise: player-count vs latency vs SLO-burn in one query). - Airflow and Astronomer: DAG locally → Astro trial 14 days → back to local (exercise: make the DAG idempotent — rerun yesterday safely). - Gemini Chatbot on the site + OTel spans per LLM call (exercise: a token-per-day metric and an SLO on p95 latency). Then the Azure AI Foundry trial on the banked account — same bot, second AI platform, comparison notes (Azure Free Account). - MongoDB Atlas: leaderboard for the game on M0 free (exercise: monitor Atlas metrics into the fan-out — database observability story). - Home Server Docker Stack: one collector container in the compose stack → Plex/ arr metrics in the same dashboards (exercise: alert on disk pressure before the disk fills). - Your two laptop games + website ideas: if either game can run headless in a container, it can join the fleet as workload 2 — same pattern, zero new concepts (Game Servers). Definition of done for the month The 07 Demo Script runs end-to-end without improvisation · every Dynatrace SLOs and Dynatrace Workflows is Terraform · the comparison doc exists with real screenshots · terraform destroy \u0026\u0026 terraform apply rebuilds the estate · every job-offer bullet has its artifact (mapping table in ARCHITECTURE.md )."},{"p":"vault/09 Signup Checklist.md","t":"✅ Signup Checklist — every account, one table","x":"✅ Signup Checklist — every account, one table Personal accounts ONLY. Card column = whether a credit card is ever seen. Usernames/emails are deliberately NOT in this public file (they live in the private session memory). Service URL Needed for Card? Status 2026-07-06 --- --- --- --- --- --- 1 GitHub (SScleves) github.com Repo, CI, Pages, GHCR images No ✅ done, repo live 2 HCP Terraform app.terraform.io Remote state + locking No 🟡 account made — finish org sscleves-lab , workspace lab , Local mode , token→ TF_API_TOKEN 3 OCI signup.cloud.oracle.com THE server (A1 ARM, k3s) Verify-only ⬜ next — quiet region! note A1 shape granted 4 Dynatrace (tenant exists) SLOs, Workflows No ✅ free until 2026-10 5 Grafana Cloud grafana.com → free OTLP backend, k6 results, IRM No ⬜ week 3 6 New Relic newrelic.com/signup Parallel backend, synthetics No ⬜ week 4 — set 50 GB guard on day one 7 Google AI Studio aistudio.google.com Gemini free API key (chatbot) No ⬜ stretch — plain Google login 8 Databricks Free Edition databricks.com/learn/free-edition Telemetry analytics No ⬜ stretch 9 Astronomer trial astronomer.io 14-day managed Airflow taste No ⬜ stretch — deleted day ~17, export first 10 MongoDB Atlas mongodb.com/cloud/atlas Game leaderboard (M0 free) No ⬜ stretch — ⚠️ verify M0 terms at signup 11 Groq console.groq.com Fallback LLM No ⬜ only if Gemini misbehaves 12 Azure (account exists) Phase 5 AI Foundry trial ONLY Yes (done) ✅ banked — never for infra — ~~GCP~~ — Nothing (Gemini = AI Studio) — ❌ rejected — ~~Elastic Cloud~~ elastic.co Optional 14-day familiarization No Optional; self-hosted is the real path Rule: sign up when the week needs it, not before — fewer live tokens, less standing surface (Secrets Hygiene). Every service\u0027s limits + where-they-bite: Free Tier Limits."},{"p":"vault/runbooks/R1 Week 1 — OCI account, server, k3s.md","t":"R1 · Week 1 — OCI account → A1 server → k3s answering kubectl","x":"R1 · Week 1 — OCI account → A1 server → k3s answering kubectl Micro-steps: one action, one verify, no skipping. Legend: [SANTI] = his hands · [GATE] = decision · [VERIFY-FIRST] = check live before executing. Rules: GUARDRAILS.md . Pre-flight (all must be ✅ before step 1) - [ ] HCP Terraform: org sscleves-lab , workspace lab , Execution Mode Local , token in GitHub secret TF_API_TOKEN AND terraform login done locally → verify: cd C:\\Repos\\personal-lab\\terraform\\envs\\lab; terraform init says \"HCP Terraform\" and succeeds. - [ ] Repo clean \u0026 current: git status clean, git pull done. - [ ] werkplek tasks imported (tracking lives there). A. OCI account [SANTI] (~15 min) 1. Decide home region [GATE] : eu-marseille-1 (recommended) or eu-paris-1. Permanent choice. 2. https://signup.cloud.oracle.com → email + verify code → identity form → card (verify-only, ~$1 hold) → phone code → wait for \"account provisioning\" email (minutes to ~1 h). 3. First login → note the tenancy name and home region shown top-right. 📸 the welcome screen. 4. [GATE] The shape question : menu ☰ → Compute → Instances → Create instance → Image \u0026 shape → Change shape → Ampere → note what VM.Standard.A1.Flex sliders allow (4 OCPU/24 GB or 2/12?) — CANCEL the wizard (we create via Terraform, not UI). Report the numbers → they set the RAM budget in 03 Phase 2 — Cluster and Agones. B. API auth for Terraform [SANTI] + Claude (~10 min) 5. Profile icon → My profile → API keys → Add API key → Generate key pair → Download private key → Save as C:\\Users\\\u003cuser \\.oci\\oci_api_key.pem (NOT in any repo). 6. OCI shows a config snippet (user/fingerprint/tenancy OCIDs + region) → paste it to Claude (OCIDs are identifiers, not secrets) → Claude writes C:\\Users\\\u003cuser \\.oci\\config . 7. Verify: oci CLI not needed — Terraform reads the same file. Gate passes when step 12\u0027s plan authenticates. C. The server, as code (Claude writes, Santi reads plans) 8. Claude fills terraform/modules/oci-cluster : VCN 10.0.0.0/16, public subnet, internet gateway, security list (22/tcp from home IP only [SANTI: confirm current IP] , 80+443/tcp any, 7000-8000/udp any, 6443/tcp home IP), A1.Flex instance (shape from step 4, Ubuntu 24.04 [VERIFY-FIRST: exact image OCID for the chosen region via OCI image list] ), cloud-init installing k3s. 9. terraform fmt -recursive → terraform validate → both clean. 10. Wire module into envs/lab/main.tf (uncomment) + variables (home IP, shape, image OCID). 11. PR flow: branch week1-oci-cluster → push → [SANTI] open PR → read the plan comment. 12. terraform plan locally too → expect ~8-12 adds, 0 destroys → read aloud. [GATE] 13. Merge [SANTI] → apply runs in Actions (or locally if CI secrets not ready) → note output public_ip . - Failure \"Out of host capacity\" → see table below, don\u0027t churn retries blindly. D. k3s alive 14. ssh ubuntu@\u003cpublic_ip works [SANTI or Claude] → if timeout: security-list ingress vs home IP is the suspect, not k3s. 15. On the VM: sudo systemctl status k3s → active (running). If not: sudo journalctl -u k3s -n 50 . 16. Kubeconfig to laptop: copy /etc/rancher/k3s/k3s.yaml , replace 127.0.0.1 with the public IP, save as %USERPROFILE%\\.kube\\config (NEVER in a repo — gitignored anyway). 17. Verify from Windows: kubectl get nodes → 1 node Ready. 📸 — Week 1 done. 18. Close-out: tick werkplek tasks, update HANDOFF-STATE, push. Failure table Symptom Do --- --- Out of host capacity (A1) Try other Availability Domain → off-peak retry → [GATE] PAYG upgrade (still €0 in free shapes, priority placement) Plan wants to DESTROY anything STOP — read why with Santi before any apply ssh timeout Home IP changed? curl ifconfig.me and fix the security-list var, re-plan kubectl x509/cert error You forgot the 127.0.0.1 → public-IP replacement (step 16) apply auth error .oci\\config path/fingerprint mismatch — re-check step 6 against the UI Do NOT : create anything via the OCI console wizard (Terraform only, or state drifts) · open 6443/22 to 0.0.0.0/0 · pick a non-A1 shape \"just to test\" (it bills)."},{"p":"vault/runbooks/R2 Week 2 — Docker, Agones, chaos.md","t":"R2 · Week 2 — arm64 image → Agones fleet → chaos on a schedule","x":"R2 · Week 2 — arm64 image → Agones fleet → chaos on a schedule Pre-flight: R1 fully green ( kubectl get nodes Ready from the laptop) · Docker Desktop or docker engine available on the build machine · GHCR login [SANTI] : classic PAT with write:packages → docker login ghcr.io -u SScleves (token via env var, never a file in a repo). A. The game image, the right architecture 1. Clone the game: git clone https://github.com/owenashurst/agar.io-clone.git C:\\Repos\\SScleves\\agario-lab (their code, our container) → npm install; npm start locally → play on localhost:3000. 📸 2. The deliberate lesson : build WITHOUT platform flag, deploy to cluster, watch exec format error in kubectl logs — now ARM is understood viscerally. (Optional but recommended once.) 3. Real build: docker buildx create --use (once) → docker buildx build --platform linux/arm64 -t ghcr.io/sscleves/agario-lab:0.1.0 --push . 4. Verify manifest: docker manifest inspect ghcr.io/sscleves/agario-lab:0.1.0 shows arm64. 5. [SANTI] ghcr.io package page → change package visibility to Public (or add a k8s imagePullSecret — Public is simpler, the code is MIT anyway). [GATE] 6. Plain-pod smoke test: kubectl run agario --image=ghcr.io/sscleves/agario-lab:0.1.0 --port 3000 → kubectl logs agario shows the server listening → delete the pod. B. Agones, pinned 7. [VERIFY-FIRST] current Agones version + helm values for arm64 at agones.dev/site/docs/installation (arm64 is Alpha — the exact flags may have moved since 2026-07). 8. helm repo add agones https://agones.dev/chart/stable \u0026\u0026 helm repo update 9. helm install agones agones/agones -n agones-system --create-namespace --version \u003cpinned 10. Verify: kubectl get pods -n agones-system all Running; kubectl get crd findstr agones shows gameservers/fleets/fleetautoscalers. 11. Smoke test with the ONLY guaranteed-arm64 example: kubectl create -f https://raw.githubusercontent.com/googleforgames/agones/release-\u003cver /examples/simple-game-server/gameserver.yaml → kubectl get gameservers reaches Ready → note its IP:PORT → test echo per Agones docs → delete it. UDP fails? → security list 7000-8000/udp AND sudo iptables -L on the VM (Oracle images ship restrictive host rules — the 1 failure, see Agones). C. The real fleet + autoscaler 12. Claude writes k8s/agario-fleet.yaml : Fleet (replicas 2, our image, containerPort 3000, [VERIFY-FIRST] the game needs no Agones SDK calls to sit Ready? if it does, wrap with the sidecar --is-local pattern or add the SDK ping — check current Agones docs on \"gameservers without SDK\") + FleetAutoscaler (Buffer policy, bufferSize 1, min 2, max 5). 13. kubectl apply -f k8s/agario-fleet.yaml → kubectl get fleet 2/2 Ready. 14. Play it from the laptop browser (IP:hostPort from kubectl get gameservers ). 📸 two browsers. D. Chaos, scheduled 15. k8s/chaos-cron.yaml : CronJob /10 , ServiceAccount+Role to delete pods in default ns, image bitnami/kubectl ( [VERIFY-FIRST] arm64 tag), command: delete one random pod labelled as gameserver. 16. Apply → wait for a run → kubectl get gameservers -w shows a kill and Agones replacing it. 📸 17. Week 2 done when: fleet self-heals on schedule + a human can always reconnect. Close-out per protocol (werkplek ticks, HANDOFF, push). Do NOT : use Bedrock or Xonotic images (ARM-broken/unverified — Game Servers) · run chaos more often than the SLO windows can absorb (Week 3 needs clean burn signals) · skip the version pin on Agones."},{"p":"vault/runbooks/R3 Week 3 — OTel fan-out, Dynatrace SLOs, Workflow.md","t":"R3 · Week 3 — one instrumentation, Dynatrace SLOs that burn, a Workflow that fires","x":"R3 · Week 3 — one instrumentation, Dynatrace SLOs that burn, a Workflow that fires The learning heart. Slow is fine; skipping verifies is not. Pre-flight: R2 green (fleet self-heals) · Dynatrace tenant reachable [SANTI] (fjl36225…dynatracelabs.com). A. Tenant credentials, scoped — never full-access 1. [SANTI] In the tenant: search \"Access tokens\" → Generate new token → name lab-otel-ingest , scopes EXACTLY: metrics.ingest , logs.ingest , openTelemetryTrace.ingest → copy once. 2. [SANTI] Hand it over the standard way: save to $env:TEMP\\dt_lab_token.txt ; Claude reads it into a k8s secret, never echoes it, deletes the file after. 3. [VERIFY-FIRST] The OTLP endpoint: in the tenant, search \"OpenTelemetry\" / open the OTLP ingest docs page INSIDE the tenant UI — copy the exact endpoint it shows for this sprint-class environment. Do not guess the URL shape. 4. kubectl create secret generic dt-ingest --from-literal=endpoint=\u003c… --from-literal=token=\u003c… → verify kubectl get secret dt-ingest → delete the temp file. B. Collector gateway, debug-first 5. Claude writes k8s/otel-collector.yaml (contrib image, [VERIFY-FIRST] current version tag + confirm arm64 manifest): receivers otlp(grpc+http) + k8s_events + kubeletstats; processors memory_limiter(256Mi) → k8sattributes → resource(env=lab) → batch; exporters: debug only for now. 6. Apply → kubectl logs deploy/otel-collector clean start, no errors. 7. Add the Dynatrace exporter (otlphttp, endpoint+token from the secret via env) → apply → logs show export success (no 401/404 — if 401: token scopes; if 404: endpoint shape, step 3). 8. Verify in tenant [SANTI] : Metrics browser → search k8s. — kubeletstats metrics arriving. 📸 C. Instrument the game (the real skill) 9. In the agario-lab fork: npm install @opentelemetry/sdk-node @opentelemetry/auto-instrumentations-node @opentelemetry/exporter-trace-otlp-http @opentelemetry/exporter-metrics-otlp-http ( [VERIFY-FIRST] current package names/majors — the JS SDK renames things). 10. Add tracing.js (NodeSDK, OTLP → collector service DNS http://otel-collector:4318 ), require it first in the start command. 11. Manual metrics in the server loop — the two that matter: game_tick_duration_ms (histogram, per tick) and game_players_active (gauge) + game_ws_rtt_ms if the clone exposes ping handling. Resource attrs: service.name=agario . 12. Rebuild image 0.2.0 (arm64!, R2 step 3 pattern) → bump Fleet → verify in tenant: Metrics browser → game_tick_duration_ms exists. 📸 [GATE] — no SLOs until this is real data. D. SLOs + alerting, as code only 13. Claude writes in terraform/modules/dynatrace-config : provider auth via env ( DYNATRACE_ENV_URL , DYNATRACE_API_TOKEN — [SANTI] mint a second token lab-terraform with settings/SLO write scopes — [VERIFY-FIRST] exact scope names the provider docs require for dynatrace_slo_v2 + workflows). 14. Resources: SLO \"Game tick health\" (p95 tick \u003c 50ms, 99% over 7d) + SLO \"Players can connect\" + alerting profile + a simple-class workflow: problem → email [SANTI\u0027s address as tfvar, gitignored] . 15. terraform plan → adds only → apply → [SANTI] see both SLOs in the tenant UI. 📸 16. The drill that makes October safe: delete ONE SLO in the UI → terraform plan shows 1 add (drift detected) → apply restores it. Config-as-code proven. E. Make it burn, make it fire 17. k6 from the laptop ( k6 run swarm.js — Claude writes a WS script ramping 0→50 VUs) while the chaos CronJob kills a gameserver mid-swarm. 18. Watch: SLO error budget burns → problem opens → workflow fires → email lands on the phone. 📸📸 (SLO burn-down + the notification). Week 3 done. 19. Close-out per protocol. Also: export/screenshot evidence NOW (trace retention is short). Do NOT : create standing \"standard\"-class workflows (cost trap on paid DPS — Dynatrace Workflows) · configure ANYTHING in the tenant UI except tokens (rule 8 of GUARDRAILS) · let the collector run without memory_limiter · add high-cardinality labels (player-id!) to metrics."},{"p":"vault/runbooks/R4 Week 4 — New Relic, Grafana, the comparison.md","t":"R4 · Week 4 — same telemetry, three more backends, the comparison doc","x":"R4 · Week 4 — same telemetry, three more backends, the comparison doc Pre-flight: R3 green (Dynatrace SLO burned and recovered on camera). A. New Relic — guard rails BEFORE data 1. [SANTI] https://newrelic.com/signup — free, no card, choose EU data center (the region mismatch is the 1 silent failure — New Relic). 2. [SANTI] Copy the license key (ingest) → temp-file handover → k8s secret nr-ingest . 3. Collector: add exporter otlphttp/newrelic → endpoint https://otlp.eu01.nr-data.net:4318 ( [VERIFY-FIRST] confirm this endpoint on the account\u0027s own OTLP setup page — match region), header api-key → apply → collector logs clean. 4. Verify data [SANTI] : NR → Metrics explorer → game_tick_duration_ms filtered by deployment.environment = lab . 📸 5. THE GUARD, before anything else : terraform/modules/newrelic-config — ( [VERIFY-FIRST] current newrelic provider resource names) NRQL drop rule for chatty k8s debug logs + alert condition on daily ingest ≈ 1.6 GB/day (≈50 GB/mo pace) → email. Plan → apply → see both in UI. [GATE] — no dashboards until the guard exists. 6. Synthetics: ping monitors (ping ONLY — 500 non-ping checks/mo trap) on the three live sites + the game\u0027s TCP status endpoint if exposed. B. Grafana Cloud 7. [SANTI] grafana.com → free account → stack → \"OpenTelemetry\" connection page → copy OTLP endpoint + instance-id + token → k8s secret. 8. Collector: exporter 3 (otlphttp, basic-auth header per their page) → apply → verify in Grafana Explore ( game_tick_duration_ms ). 📸 9. Watch the series count for a day: Billing/Usage → active series must stay ≪10k (cardinality guardrail). 10. k6 → Grafana: rerun the R3 swarm with -o experimental-prometheus-rw or k6 cloud output ( [VERIFY-FIRST] current flag; 500 VUh/mo included) → load graphs land in Grafana. C. Elastic on-cluster (already installed in R2 world? if not: single-node ES+Kibana now) 11. Collector exporter 4: elasticsearch (logs) → Kibana Discover shows game + chaos logs. Free-tier reality check: alert CONNECTORS can\u0027t email (Elastic Stack) — detection parity only, and that\u0027s the honest comparison point. D. The comparison doc (the deliverable interviews love) 12. Run 07 Demo Script once end-to-end; capture the SAME incident in all four UIs. 📸×4 13. Write vault/Vendor Comparison.md , one page per theme: time-to-detect (measured!) · problem correlation quality · query languages (DQL vs NRQL vs PromQL/LogQL vs KQL — the same three questions answered in each) · SLO modelling · alert routing · pricing model + where each free tier bites (Free Tier Limits) · \"which would I deploy at a client and why\". 14. Week 4 done = demo rehearsed + comparison doc committed. Close-out per protocol. Do NOT : browser/scripted synthetics (500/mo trap) · dashboards before the NR ingest guard · high-cardinality labels (10k series wall) · trust any endpoint region without checking the account\u0027s own setup page."},{"p":"vault/runbooks/R5 Stretch — Databricks, Airflow, Gemini, AI Foundry.md","t":"R5 · Stretch — analytics + AI: Databricks, Airflow, Gemini chatbot, (Azure AI Foundry)","x":"R5 · Stretch — analytics + AI: Databricks, Airflow, Gemini chatbot, (Azure AI Foundry) Independent blocks — do them in any order after R3. Each ends visibly demonstrable. Block 1 — Databricks Free Edition (telemetry analytics) 1. [SANTI] databricks.com/learn/free-edition → sign up (personal email/Google — no card). 2. [VERIFY-FIRST] Free Edition limits page (fair-use compute cutoff still daily? volumes still the ingest path? DBFS still absent?) — re-verify, it changed once already (CE→Free). 3. Collector: add file exporter writing rolling JSON to a hostPath on the VM (staging dir). 4. Nightly export job (k8s CronJob first, Airflow later): roll up yesterday\u0027s file → Parquet (tiny Python + pyarrow container, arm64) → upload via Databricks SDK ( [SANTI] PAT from Free Edition → k8s secret). 5. In Databricks: UC Volume lab/telemetry → COPY INTO a Delta table → one SQL dashboard: players vs tick p95 vs SLO burns per day. 📸 — the job-offer keyword, demonstrated. Block 2 — Airflow via Astronomer trial → local Astro CLI 6. Build the DAG LOCALLY first (astro CLI, free): winget install Astronomer.Astro [VERIFY-FIRST] winget id — else the curl install per astronomer docs → astro dev init/start → port the step-4 export into a DAG (extract → parquet → upload), make it idempotent (rerun yesterday safely). 7. [SANTI] THEN the 14-day trial (astronomer.io — no card): deploy the same DAG, taste the hosted product, 📸 the deployment. Export config before day 14 — hard deletion ~day 17. 8. Instrument the DAG (OTel or at minimum task-duration → Dynatrace via API) — observing the orchestrator is its own bullet. Block 3 — Gemini chatbot on the Dutch site (the AI-observability story) 9. [SANTI] aistudio.google.com → API key (plain Google account) → check the live rate limits in the AI Studio dashboard (they\u0027re not published anymore — record what YOURS says). 10. Tiny API: one FastAPI/Express pod on the cluster POST /chat → Gemini Flash ( [VERIFY-FIRST] current flash model id from the AI Studio docs page), key via k8s secret. NEVER the key in the static site — Pages is public source. 11. OTel spans around every LLM call: model, prompt/completion tokens (from the response usage block), latency, error class. Metric llm_tokens_total per day. 12. Dutch site: swap the BYOK Anthropic box to ALSO offer \"Santi\u0027s tutor\" → calls the pod endpoint (CORS: allow the Pages origin only). 13. SLO in Dynatrace: chatbot p95 \u003c 3s / 95%. Gentle k6 (respect the free RPM!) to demo it. 📸 14. Groq fallback (same OpenAI-shape call) behind an env flag — vendor failover as config. Block 4 — Azure AI Foundry (the banked account\u0027s ONLY job) 15. [GATE + VERIFY-FIRST] Only if Santi wants the extra bullet: verify CURRENT AI Foundry free/trial terms live (never from memory), then: same chatbot, second provider via AI Foundry\u0027s endpoint → the comparison paragraph (\"AI Studio vs AI Foundry — same bot, what each gives you\") in the comparison doc. The Azure account does NOTHING else (GUARDRAILS 13). Do NOT : exceed Databricks fair-use with sustained queries (daily cutoff) · leave the Astro trial deployment undeleted past day 14 · put ANY API key in a public repo or the static site · let the chatbot log full prompts with personal content into four backends."},{"p":"vault/tech/Agones.md","t":"Agones","x":"Agones Google\u0027s open-source game-server orchestration for Kubernetes — real CV keyword, used by actual studios. Manages GameServer pods, Fleet s, and autoscaling. The self-heal star of 07 Demo Script: when the chaos job kills a gameserver, Agones replaces it while Dynatrace proves the detection. ✅ Verified 2026-07-06 (web, sources checked live) - Current stable v1.59.0 (2026-06-30), ~6-week cadence, k8s 1.33–1.35. - linux/arm64 images exist since v1.23 but arm64 is officially ALPHA (only amd64 is Stable) — matters because OCI Always Free is ARM. Mitigation: pin the version, smoke-test with simple-game-server (the one example image guaranteed arm64), upgrade deliberately. - k3s: known-working, unofficial (supported list is GKE/AKS/EKS/Minikube; Linode published a k3s+Agones+Xonotic guide). Fine for a lab. - GameServers use hostPort UDP 7000-8000 by default → open in VCN security list AND host iptables (k3s). Port range also caps concurrent servers on one node. - FleetAutoscaler : Buffer, Webhook, Chain, Schedule policies plus Counter/List (Beta, on by default) — true player-count scaling works, but the game must call the SDK counter APIs. On one node, over-scale just yields Pending pods (fine: that\u0027s a visible autoscaling story anyway). Install (Phase 2) Smoke test: deploy the official simple-game-server Fleet before any real game — Game Servers."},{"p":"vault/tech/Airflow and Astronomer.md","t":"Airflow \u0026 Astronomer","x":"Airflow \u0026 Astronomer Reuses what Santi already knows from work (Airflow 3) on a personal stage. One real DAG with a real purpose: the nightly telemetry → Parquet → Databricks load. Verified 2026-07-06 (Free Tier Limits) - Astro trial: 14 days AND $20 credit — the $20 is the real ceiling (~57 h of the smallest always-on deployment). No card. Deployment hard-deleted ~day 17 — export config before day 14. - No free hosted tier exists. Long-term path: local Astro CLI (free, Apache-2.0+Commons-Clause, astro dev start runs full Airflow in Docker — laptop or the home box, Home Server Docker Stack). Plan (Phase 5) 1. Build the DAG locally first (Astro CLI) — it must not depend on Astro-hosted features. 2. Start the trial → deploy the same DAG → screenshot the hosted experience (that\u0027s the familiarization goal) → export → back to local before day 14. 3. Instrument the DAG itself with OpenTelemetry (task duration, failure alerts via Dynatrace) — observing the orchestrator is its own job-offer bullet."},{"p":"vault/tech/Azure Free Account.md","t":"Azure Free Account — DROPPED 2026-07-06","x":"Azure Free Account — DROPPED 2026-07-06 Azure was designed in as the \"work-mirror\" (state blob, static site, probe VM) but the free-account signup proved impossible from Santi\u0027s identities: the gmail address is entangled with a GitHub-created Microsoft identity, and the signup loops forever on credential creation (a known failure mode of the \"Sign in with GitHub\" flow; even the pre-created-MSA path looped). What replaced it Azure job Replacement --- --- Terraform remote state HCP Terraform (free, no card, state + locking) Dutch-lessons site GitHub Pages Probe VM New Relic free synthetics (unlimited ping monitors) Net effect: one less account, one less card, no month-13 billing trap — the design got simpler. Plot twist (same day): account created after all — but the design stays zero-Azure A fresh outlook.com identity (created clean, never via GitHub) broke the signup loop and the account now EXISTS. Decision: keep the simpler zero-Azure wiring (HCP Terraform state, GitHub Pages, New Relic synthetics) and reserve the Azure account for Phase 5: an Azure AI Foundry trial on the Gemini Chatbot — the one job only Azure can do here (AI Foundry is the literal job-offer keyword). The Phase 0 Azure research in Free Tier Limits applies whenever that day comes. If the account is ever used for real resources: the month-13 billing trap and free-services-flow rules in the history of this note apply."},{"p":"vault/tech/Databricks.md","t":"Databricks","x":"Databricks The job-offer keyword made real: telemetry analytics on Free Edition (verified 2026-07-06 — permanent, personal email OK, replaced Community Edition in 2025). What free gives / where it bites (Free Tier Limits) Serverless-only: 1 SQL warehouse (2X-Small), notebooks, dashboards, Unity Catalog volumes . Daily fair-usage compute cutoff (exceed → compute off for the day). Ingest is file-shaped — no streaming endpoint, DBFS unavailable: land Parquet files in a UC volume, then COPY INTO /Auto Loader into Delta tables. The pipeline (Phase 5) 1. OTel Collector file exporter stages telemetry on the cluster. 2. Nightly DAG (Airflow and Astronomer): roll up → Parquet → upload via Databricks SDK → volume. 3. Delta table + SQL dashboard: player count vs latency vs SLO burn; incident table from Dynatrace Workflows step 4. This also solves the retention problem — Grafana Cloud keeps 14 days, New Relic traces 8; Databricks is the lab\u0027s long memory."},{"p":"vault/tech/Docker.md","t":"Docker","x":"Docker Everything on the cluster is a container, and the OCI Always Free server is ARM64 — so the one Docker skill this lab drills hard is multi-arch builds . Images live on GHCR (GitHub Container Registry — free for public repos, same login you already have). The build that matters (Week 2, gates the whole game fleet) Auth: docker login ghcr.io -u SScleves with a GitHub PAT ( write:packages scope) — the PAT is a secret (Secrets Hygiene): env var, never the repo. Exercises 1. The arm64 lesson : build the image WITHOUT --platform on your amd64 laptop, deploy to the cluster, watch exec format error in the pod logs — now you\u0027ve seen the bug the whole ARM constraint is about. Rebuild correctly. 2. Multi-stage shrink : node:22 → node:22-alpine multi-stage; measure image size before/after ( docker images ), and pod startup time — smaller images = faster Agones respawns, which is a real SLO input. 3. Read a Dockerfile like a reviewer : the itzg/minecraft-server Dockerfile — find where it handles multi-arch and what its healthcheck does. 4. Wire the build into GitHub Actions: on tag push, buildx + push to GHCR — the same plan/apply pedagogy, applied to images. Home context: your Home Server Docker Stack is compose-based amd64 — different arch, same concepts; the collector container you add there is exercise 4\u0027s image reused."},{"p":"vault/tech/Dynatrace SLOs.md","t":"Dynatrace SLOs","x":"Dynatrace SLOs Learning target 1. Game servers make SLOs visceral: latency isn\u0027t an abstract number, it\u0027s whether the game feels playable. The lab\u0027s SLOs (defined as code in dynatrace-config — Terraform) SLO SLI source Target Why it\u0027s a good story --- --- --- --- Game tick health game.tick.duration p95 \u003c 50 ms (OpenTelemetry) 99% Server-side quality — degrades under load BEFORE players notice Connect latency game.ws.rtt p95 \u003c 150 ms 99.5% The player-facing promise Chatbot latency Gemini Chatbot span p95 \u003c 3 s 95% The AI-observability SLO Site availability New Relic synthetic pings on the GitHub Pages site 99.9% Classic uptime, zero infra The demo mechanic (07 Demo Script) Chaos kill → connected players drop → error budget burns visibly → problem opens → Dynatrace Workflows fires → Agones replacement absorbs players → burn stops. Screenshot the burn-down curve: that picture IS the interview answer to \"explain error budgets.\" Design notes: choose evaluation windows short enough to see burn during a 5-min demo (fast-burn rate alert), long enough to be honest (7-day budget)."},{"p":"vault/tech/Dynatrace Workflows.md","t":"Dynatrace Workflows","x":"Dynatrace Workflows Learning target 2: problem → automated action. The honest version of the lab\u0027s \"self-healing\" story: Agones replaces killed gameservers on its own — the Workflow\u0027s job is everything around that: detect, notify, annotate, and prove closed-loop automation. The lab workflow (as code in dynatrace-config ) Trigger: problem event matching the game SLO alerting profile (Dynatrace SLOs). Steps: 1. Notify (email/webhook → phone on camera — 07 Demo Script). 2. Annotate: push a deployment/incident marker to Grafana Cloud so the comparison dashboards show the same moment. 3. Act: call the Agones allocation API / kubectl webhook to pre-warm a replacement gameserver — the closed loop. 4. (Stretch) Open a ticket-shaped record in a Databricks table — incident analytics later (Databricks). Cost/design rules (verified 2026-07-06) - Free inside the current tenant window (Dynatrace). On paid DPS: standing standard workflow ≈ $22/mo just existing; simple workflows (1 trigger + 1 action) ≈ free. - Keep the lab\u0027s always-on workflow SIMPLE-class if possible; standard ones get created for demo days and destroyed after — trivial because they\u0027re Terraform resources."},{"p":"vault/tech/Dynatrace.md","t":"Dynatrace","x":"Dynatrace The primary backend and the primary learning target: Dynatrace SLOs + Dynatrace Workflows. Tenant situation (the fact that shapes everything) - Santi\u0027s personal tenant is free until 2026-10 — the whole build window fits inside it. - Verified 2026-07-06: after any tenant expires, UI/ingest block immediately and the tenant is permanently deleted 30 days later . No free tier, no self-serve cheap plan exists for individuals. - Therefore: the tenant is cattle, not a pet. Every SLO, workflow, alerting profile, tag rule and token lives in terraform/modules/dynatrace-config (Terraform). Post-October: new 15-day trial → re-apply → back in ~10 minutes. Rehearse the drill once before October. Ingest (Phase 3) OTLP from the OTel Collector: https://\u003cenv .live.dynatrace.com/api/v2/otlp — token with openTelemetryTrace.ingest , metrics.ingest , logs.ingest scopes, minted in the tenant, stored as k8s secret via Terraform (Secrets Hygiene). Optional later: OneAgent-operator for the deep k8s view — heavier; start OTLP-only. Cost awareness (matters post-October or on any paid tenant) On paid DPS a standing \"standard\" workflow bills ~$22/month just for existing ; \"simple\" workflows (single trigger+action) are free apart from per-invocation pennies. Design lab workflows as simple where possible; create/delete standard ones around demos."},{"p":"vault/tech/Elastic Stack.md","t":"Elastic Stack (self-hosted, free Basic)","x":"Elastic Stack (self-hosted, free Basic) The \"I ran my own pipeline\" story: ES + Kibana on the k3s cluster, fed by the OTel Collector. Verified 2026-07-06: free Basic license covers ES, Kibana, OTLP/APM ingest, and basic alerting — self-hosted, forever (Elastic is AGPL-optioned open source again since 2024). RAM reality (why this took design work) ES 2 GB container/1 GB heap floor + Kibana ~1 GB. Fits the OCI budget only because it was reserved in 03 Phase 2 — Cluster and Agones. Logstash JVM wants 4-8 GB → demo-days only : spin it up, learn pipelines, tear down. Daily log shipping = Filebeat or the collector\u0027s elasticsearch exporter. Known free-tier limits (don\u0027t fight them, document them) - Alert connectors on free = write-to-index + server-log only — no email/Slack. The alerts that fire live in Dynatrace/New Relic/Grafana Cloud; Kibana shows detection parity instead. - No ML anomaly detection (paid). OpenSearch alternative has free alerting but same RAM appetite — noted, not chosen (Elastic is the CV keyword). Elastic Cloud trial (optional familiarization) 14 days, no card, data deleted ~day 44 — the trial-then-self-host pattern: use it to learn Fleet/managed UX, never depend on it."},{"p":"vault/tech/Free Tier Limits.md","t":"Free Tier Limits — verified 2026-07-06 via live vendor pages","x":"Free Tier Limits — verified 2026-07-06 via live vendor pages The Phase 0 research table. Re-verify anything here before relying on it after ~2026-Q4. Service Free offer Expiry Where it bites --- --- --- --- Azure Free Account ~~$200/30d + 12-mo + always-free~~ DROPPED (signup loop) — Research kept for a possible future AI Foundry trial HCP Terraform 500 managed resources, state+locking, no card (✅ verified) Never Over-cap = blocked runs, not a bill; 1 concurrent run (irrelevant solo) GitHub Pages Free static hosting on public repos (✅ verified) Never 100 GB/mo soft bandwidth, 1 GB site; static only (chatbot API lives on the cluster) OCI Always Free ARM A1: 4 OCPU/24 GB — possibly cut to 2/12 June 2026 (unofficial) Never Verify shape at signup; capacity scarcity; home region permanent; PAYG upgrade = priority + maybe 4/24 Dynatrace Santi\u0027s tenant to 2026-10; else 15-day trials 2026-10 Tenant deleted 30d post-expiry → all config as Terraform code; paid standing std workflow ≈$22/mo New Relic 100 GB/mo + 1 full user, no card Never Overage = full lockout till month end → 50 GB guard; traces ~8d retention Grafana Cloud 10k series, 50 GB logs, 50 GB traces, OTLP, IRM, 500 k6 VUh Never 14-day retention; series-cap blowouts Elastic Stack self-hosted Basic license: ES+Kibana+APM/OTLP+basic alerting Never ~8 GB RAM realistic floor; free connectors can\u0027t email/Slack; Logstash JVM 4-8 GB Elastic Cloud 14-day trial, no card d14; data gone d~44 Eval only; cheapest paid ~$99/mo Databricks Free Edition Permanent, personal email, 2X-Small WH, UC volumes Never Daily fair-use compute cutoff; file-shaped ingest only Airflow and Astronomer 14 days AND $20 credit ~d14; deleted d~17 $20 ≈ 57 h always-on smallest deployment; export before expiry → local Astro CLI GitHub Actions Public repos: unlimited minutes + branch protection Never Private: 2,000 min/mo, no branch protection on free Gemini Chatbot Flash models free, no card Never Exact RPM/RPD now dashboard-only (AI Studio); free data may train Google models Groq (fallback LLM) 30 RPM / 14.4k RPD (8B model), no card Never TPM caps on long prompts; model lineup churns Flagged as unverified at research time: OCI exact terms (verify at signup) · Dynatrace re-trial eligibility (community lore) · Azure itemized always-free list (marketing pages fetch-blocked; Learn pages confirmed the load-bearing numbers)."},{"p":"vault/tech/Frontend RUM.md","t":"Frontend RUM — agents on the personal apps","x":"Frontend RUM — agents on the personal apps Santi\u0027s own frontends all get real-user monitoring — the same fan-out philosophy as the cluster, applied to browsers. The fleet: App Repo What RUM sees --- --- --- werkplek (React PWA, the flagship) github.com/SScleves/werkplek SPA route changes, JS errors, IndexedDB-heavy interactions, Supabase fetch timing The Truth + the book github.com/SScleves/thetruth Reading behavior per chapter, page-load on image-heavy pages Dutch-lessons site (Alienware Mission A) Availability + TTFB baseline, later chatbot UX timing The plan (wire when the New Relic account exists — Week 4 or earlier) 1. New Relic Browser (free tier, standing): create one Browser app per site → copy the loader snippet → werkplek: into index.html head (template) · thetruth/book: the \u003c!-- RUM snippet slot -- comments already mark the spot in _build/build-book.ps1 templates. 2. Dynatrace RUM as the learning exercise (agentless RUM needs the tenant\u0027s JS tag): add to ONE app (werkplek), compare session view vs New Relic — vendor-comparison material. Tenant dies in October: RUM config lives in dynatrace-config Terraform where possible. 3. Watch PII: RUM captures URLs and user actions — these are personal-use apps, fine, but no session replay on werkplek (it contains his notes/journal text in the DOM). Terraform angle (the \"manage it as code\" story) The github provider can manage the repos themselves — Pages settings, branch protection, topics — from terraform/ : real IaC over the whole SScleves estate. Nice Phase-5+ exercise; the RUM snippets stay in the HTML templates (content, not infra). Supabase note (werkplek) The committed anon key is Supabase\u0027s intended public model only if Row Level Security is enabled on every table — Santi: verify once in Supabase dashboard → Table editor → RLS badges."},{"p":"vault/tech/Game Servers.md","t":"Game Servers","x":"Game Servers What the lab observes and auto-heals. Verified 2026-07-06 for ARM64 (the OCI Always Free constraint). The line-up (in deployment order) 1. simple-game-server (Agones official example) — guaranteed arm64, UDP echo. Pure smoke test for Agones; deploy first, delete after. 2. agar.io-clone (owenashurst/agar.io-clone, MIT, Node.js + Socket.IO) — the MVP fleet . Node is arm64-native, Dockerfile included, WebSocket transport means k6 load-tests it NATIVELY (k6 has no UDP). Instrument the server loop ourselves with OpenTelemetry: tick duration + WS round-trip latency → the two Dynatrace SLOs. Bots = simple WS scripts. 3. Minecraft Java ( itzg/minecraft-server , multi-arch arm64) — the recognizable demo piece. ~2 GB RAM vanilla; run as a second, smaller Fleet or demo-days only if RAM is tight (see budget in 03 Phase 2 — Cluster and Agones). Load: Minecraft bot library, not k6. Player-count autoscaling needs a small sidecar calling the Agones SDK counter API. Avoid (verified) - Minecraft Bedrock on ARM: x86-only binaries, runs via box64 emulation with known illegal-instruction bugs. Java only. - Xonotic / SuperTuxKart example images : arm64 manifests unverified — assume amd64-only unless docker manifest inspect proves otherwise. - saulmaldonado/agones-minecraft : abandoned (2021, GKE-specific) — reference architecture only. Also observed (non-game workloads) - Dutch-lessons site + Gemini Chatbot (Azure static hosting). - Optional: the home Home Server Docker Stack (Plex/ arr) as a second real environment."},{"p":"vault/tech/Gemini Chatbot.md","t":"Gemini Chatbot — the AI-observability story","x":"Gemini Chatbot — the AI-observability story A small Dutch-lessons chatbot (practice-sentence generator / vocab quizzer) on the existing site, backed by a free-tier LLM, instrumented end-to-end. This is the \"AI observability / AI Foundry\" interview material: real traces of real LLM calls. LLM choice (verified 2026-07-06 — Free Tier Limits) - Primary: Gemini Flash class — free tier, Google account only, no card, no expiry. Exact RPM/RPD now live only in the AI Studio dashboard — check after signup. Free-tier prompts may train Google models: fine for Dutch grammar, never paste anything personal. - Fallback: Groq (llama-3.1-8b: 30 RPM / 14.4k req-day, published limits, OpenAI-compatible — the OpenTelemetry wrapper stays identical). - No Anthropic free tier exists; Mistral\u0027s limits are unpublished — both rejected in Phase 0. Instrumentation (Phase 5, the point of the exercise) Span per LLM call: model, prompt/completion tokens, latency, error class, (opt-in) truncated prompt. Metrics: llm.request.duration p95 → its own SLO (Dynatrace SLOs), token counts per day (a cost-shaped metric even at €0 — that\u0027s the FinOps-flavored talking point). k6 gives it gentle load for the demo. API key: serverless env var, never the repo (Secrets Hygiene)."},{"p":"vault/tech/GitHub Actions.md","t":"GitHub Actions","x":"GitHub Actions CI for the lab, mirroring the work pattern: plan on PR, apply on main ( .github/workflows/terraform.yml ) plus gitleaks on every push ( gitleaks.yml — Secrets Hygiene). Why the repo is public Verified 2026-07-06 (Free Tier Limits): public repos get unlimited standard-runner minutes AND branch protection on the free plan; private repos get 2,000 min/month and no branch protection. Public also = portfolio. Consequence: secrets hygiene is non-negotiable from commit 1. Secrets needed (Settings → Secrets → Actions) Phase 1: TF_API_TOKEN (HCP Terraform user token — state read/write). Phase 2: OCI auth. Phase 3+: DYNATRACE_API_TOKEN , NEW_RELIC_API_KEY , GRAFANA_CLOUD_TOKEN ; GHCR image pushes use a PAT with write:packages (Docker). Add per phase, never earlier — least privilege, least standing surface."},{"p":"vault/tech/GitHub Estate Guide.md","t":"GitHub Estate Guide — how everything you own is managed","x":"GitHub Estate Guide — how everything you own is managed The one guide for \"how do I run my stuff on GitHub.\" Everything below is what we actually do — including the mistakes already made, so they don\u0027t repeat. 1. The mental model (30 seconds) A repo is a folder with a memory (every change, forever). GitHub holds the shared copy; every machine (work PC, Alienware, Linux server) syncs against it. Your loop on any machine: If push says rejected (non-fast-forward) → you forgot git pull first. 2. Your estate — every repo and its job Repo What it is How it publishes --- --- --- personal-lab The lab: this vault, missions, Terraform, CI Not a website; search.html from any clone thetruth The site + the book Something Doesn\u0027t Fit Pages, deploy-from-branch ( main /root) werkplek The notes/productivity PWA (\"the notes like this\") Pages via Actions build (push = auto-deploy) dutch-lessons the Dutch study site (single self-contained index.html) Pages, deploy-from-branch ~~my-awesome-website, numbers~~ deleted 2026-07 (empty shell + duplicate template) — Docker/Plex box deliberately has NO repo — configs stay in ~/observability/ on the box reads the missions from personal-lab (Home Server Docker Stack) 2b. Launch card — every app: where it runs + how to run it locally App Live URL Run locally Update guide --- --- --- --- The Truth + book https://sscleves.github.io/thetruth/ double-click index.html UPDATING.md in that repo werkplek https://sscleves.github.io/werkplek/ npm install then npm run dev (needs Node) its README.md Dutch site https://sscleves.github.io/dutch-lessons/ double-click index.html its README.md (add-a-lesson recipe included) This vault not a website Obsidian → open vault/ folder 00 Home Lab infra not a website terraform plan in envs/lab 08 Month Plan 3. Websites = GitHub Pages, two flavors you own Flavor A — deploy from branch (thetruth, dutch-lessons): repo Settings → https://github.com/SScleves/thetruth/settings/pages → Source: Deploy from a branch → main + / (root) → Save. GitHub runs \"pages build and deployment\" (watch the Actions tab), then the site is at https://sscleves.github.io/\u003crepo / . ⚠️ Today\u0027s lesson: pushing is NOT publishing. The book 404\u0027d because Pages was never enabled — has_pages: false . Enabling it is a one-time manual click (until Terraform owns it — section 6). Flavor B — build via Actions (werkplek): .github/workflows/deploy.yml compiles the React app and deploys dist/ . You never click anything: push to main = live site ~2 min later. Check state: repo → Actions tab → newest run green? 4. The content workflows - The book : edit book/source.txt in thetruth → powershell _build\\build-book.ps1 → commit source + generated book/ .html together → push. Site updates itself (flavor A). - The site pages (index/about/contact): plain HTML in the book\u0027s tone — edit, push, live. Topic ideas go in TOPICS.md first. - Notes (werkplek) : the app\u0027s code is the repo; your notes data lives in the browser (IndexedDB) — NOT on GitHub. Back it up via Settings → Data → Export inside the app. - This vault : edit .md in personal-lab/vault/ , rebuild search.html ( powershell _build\\build-search.ps1 ), push. Every machine\u0027s Obsidian sees it after git pull . 5. Solo-dev process rules - personal-lab (has CI that changes infra): branch + PR → plan runs → merge → apply runs. - thetruth / werkplek / dutch-lessons (content): pushing straight to main is fine — you\u0027re the only author and Pages is the only consumer. - Identity per repo: personal repos must commit as SScleves / santiagosanch@gmail.com — set with repo-local git config user.name/user.email (NEVER --global on the work machine). We already leaked a work email into a commit once and amended it out pre-push. - Secrets: only in Actions secrets (repo Settings → Secrets) — never in files. Gitleaks guards every push (Secrets Hygiene). 6. Terraform reconciliation — the estate as code The endgame: terraform/modules/github-estate in personal-lab manages the repos THEMSELVES — Pages settings, descriptions, branch protection — via the GitHub provider , impor
